services:
  naima:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naima-app
    restart: unless-stopped
    depends_on:
      pgvector:
        condition: service_healthy
      searxng:
        condition: service_healthy
      tika:
        condition: service_started
    env_file:
      - .env
    environment:
      NAIMA_PGVECTOR_DSN: postgres://naima:naima@pgvector:5432/naima?sslmode=disable
      NAIMA_SEARX_URL: http://searxng:8080
      NAIMA_TIKA_URL: http://tika:9998
      NAIMA_SESSION_FILE: /data/.naima_session.json
    volumes:
      - naima_data:/data

  caddy:
    image: caddy:2-alpine
    container_name: naima-caddy
    restart: unless-stopped
    depends_on:
      naima:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    ports:
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: naima-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: naima
      POSTGRES_PASSWORD: naima
      POSTGRES_DB: naima
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naima -d naima"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: valkey/valkey:8-alpine
    container_name: naima-searx-redis
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  searxng:
    image: searxng/searxng:latest
    container_name: naima-searxng
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SEARXNG_REDIS_URL: redis://redis:6379/0
      SEARXNG_URL: http://localhost:8081/
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  tika:
    image: apache/tika:latest
    container_name: naima-tika
    restart: unless-stopped

volumes:
  pgvector_data:
  naima_data:
  caddy_data:
  caddy_config:

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naima Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0F14;
      --panel: #101720;
      --text: #3DF2E0;
      --muted: #7adbd2;
      --accent: #3DF2E0;
      --accent-2: #2bc4b5;
      --bubble-user: #132a34;
      --bubble-ai: #0f1f2a;
      --border: #1f3f4b;
      --ops-bg: #0d141c;
      --ops-top-bg: #0a1219;
      --surface: #0b1118;
      --surface-2: #101a24;
      --send-fg: #0B0F14;
    }
    body.theme-quantum {
      --bg: #0E2A47;
      --panel: #102d4b;
      --text: #d4c8ff;
      --muted: #b8a6ff;
      --accent: #a88cff;
      --accent-2: #8b6dff;
      --bubble-user: #173a60;
      --bubble-ai: #122f4d;
      --border: #6e6fc9;
      --ops-bg: #102f50;
      --ops-top-bg: #0f2a45;
      --surface: #16395d;
      --surface-2: #1b4067;
      --send-fg: #0e1f34;
    }
    body.theme-void-light {
      --bg: #3DF2E0;
      --panel: #d7fffa;
      --text: #0B0F14;
      --muted: #20343f;
      --accent: #0B0F14;
      --accent-2: #1e2a36;
      --bubble-user: #baf7ef;
      --bubble-ai: #cffff7;
      --border: #2e5662;
      --ops-bg: #e9fffc;
      --ops-top-bg: #dcfffb;
      --surface: #f5fffd;
      --surface-2: #d5f7f2;
      --send-fg: #3DF2E0;
    }
    body.theme-quantum-light {
      --bg: #d4c8ff;
      --panel: #efe8ff;
      --text: #0E2A47;
      --muted: #2c4360;
      --accent: #0E2A47;
      --accent-2: #244a73;
      --bubble-user: #e5dcff;
      --bubble-ai: #f2edff;
      --border: #4e5f8f;
      --ops-bg: #f1ebff;
      --ops-top-bg: #e8dfff;
      --surface: #faf7ff;
      --surface-2: #e8dcff;
      --send-fg: #8A6CFF;
    }
    * {
      box-sizing: border-box;
      font-family: "Kode Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      font-size: 72.9%;
    }
    .layout {
      width: 100%;
      height: 100vh;
    }
    .app {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-left: 1px solid var(--border);
      height: 100vh;
      width: calc(100% - 380px);
      overflow: hidden;
    }
    .ops {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 380px;
      border-left: 1px solid var(--border);
      background: var(--ops-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 8px;
      gap: 8px;
    }
    .section-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 8px;
      display: flex;
      flex-direction: column;
    }
    .section-panel.collapsed {
      min-height: 0;
    }
    .ops-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .ops-head h3 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .operations-panel.collapsed .ops-head {
      margin-bottom: 0;
    }
    .ops-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .ops-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
    }
    .ops-list li {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text);
      background: var(--surface);
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ops-time {
      display: inline-block;
      color: var(--muted);
      font-size: 9px;
      margin-right: 6px;
    }
    a {
      color: #58f8ea;
      text-decoration-color: #2bc4b5;
    }
    a:visited {
      color: #4fd2c8;
      text-decoration-color: #2aa39a;
    }
    a:hover {
      color: #7ffdf1;
      text-decoration-color: #7ffdf1;
    }
    a:active {
      color: #36cfc1;
    }
    .settings-panel {
      min-height: 0;
    }
    .brand-panel {
      border-bottom: 1px solid var(--border);
      background: var(--ops-top-bg);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }
    .brand-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      flex: 0 0 auto;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .brand-name {
      margin: 0;
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.03em;
      font-weight: 600;
      text-align: right;
    }
    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .settings-panel.collapsed .settings-head {
      margin-bottom: 0;
    }
    .settings-head h3 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .settings-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .settings-body {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 26vh;
      overflow-y: auto;
    }
    .theme-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .theme-row label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .theme-row select {
      width: 100%;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
    }
    .settings-body input[type="password"] {
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 11px;
      background: var(--surface);
      color: var(--text);
    }
    .settings-body button {
      height: 36px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      padding: 0 10px;
      cursor: pointer;
      font-size: 11px;
    }
    .tools-panel {
      min-height: 190px;
    }
    .tools-panel.collapsed {
      min-height: 0;
    }
    .tools-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .tools-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }
    .tools-panel.collapsed .tools-head {
      margin-bottom: 0;
    }
    .tools-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .memory-panel {
      min-height: 120px;
    }
    .memory-panel.collapsed {
      min-height: 0;
    }
    .memory-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }
    .memory-panel.collapsed .memory-head {
      margin-bottom: 0;
    }
    .memory-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .memory-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .operations-panel {
      min-height: 0;
      flex: 1;
    }
    .memory-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .memory-item {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      background: var(--ops-bg);
      min-width: 0;
    }
    .memory-key {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .memory-val {
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .tools-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
    }
    .tools-action {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 10px;
      font-size: 10px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 6px;
    }
    .pkb-launch {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
    }
    .is-hidden {
      display: none !important;
    }
    .tool-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 7px;
      background: var(--ops-bg);
    }
    .tool-name {
      color: var(--text);
      font-weight: 600;
      margin-right: 6px;
    }
    .tool-desc {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .tool-toggle {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row {
      display: flex;
      width: 100%;
    }
    .row.user { justify-content: flex-end; }
    .row.ai { justify-content: flex-start; }
    .bubble {
      max-width: min(86%, 760px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 13px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.25);
    }
    .user .bubble {
      background: var(--bubble-user);
      border-color: var(--border);
    }
    .ai .bubble {
      background: var(--bubble-ai);
    }
    .composer {
      border-top: 1px solid var(--border);
      background: var(--ops-bg);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      flex-shrink: 0;
    }
    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
    }
    .send {
      height: 44px;
      min-width: 90px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: var(--send-fg);
      font-weight: 600;
      cursor: pointer;
    }
    .send:disabled {
      background: #9abbe0;
      cursor: not-allowed;
    }
    .status {
      font-size: 10px;
      color: var(--muted);
      padding: 0 12px 8px;
      min-height: 18px;
      flex-shrink: 0;
    }
    .pkb-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 10, 16, 0.92);
      backdrop-filter: blur(8px);
      z-index: 20;
      display: flex;
      padding: 18px;
    }
    .pkb-shell {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--panel), var(--surface));
      display: grid;
      grid-template-columns: minmax(320px, 60%) minmax(320px, 40%);
      overflow: hidden;
      transition: grid-template-columns 420ms ease;
    }
    .pkb-shell.has-selection {
      grid-template-columns: minmax(320px, 40%) minmax(320px, 60%);
    }
    .pkb-stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        radial-gradient(circle at top, rgba(61, 242, 224, 0.12), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.1));
    }
    .pkb-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    .pkb-canvas.dragging {
      cursor: grabbing;
    }
    .pkb-toolbar {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }
    .pkb-badge,
    .pkb-toolbar button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(16, 23, 32, 0.8);
      color: var(--text);
      padding: 6px 10px;
      font-size: 10px;
    }
    .pkb-toolbar button {
      cursor: pointer;
    }
    .pkb-toolbar-group {
      display: flex;
      gap: 8px;
    }
    .pkb-panel {
      border-left: 1px solid var(--border);
      background: var(--ops-bg);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pkb-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .pkb-panel-head h3 {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .pkb-close {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      font-size: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .pkb-panel-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      min-height: 0;
    }
    .pkb-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .pkb-stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 8px;
    }
    .pkb-stat-key {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pkb-stat-val {
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .pkb-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .pkb-card.is-clickable {
      cursor: pointer;
    }
    .pkb-card.is-clickable:hover {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    .pkb-card h4 {
      margin: 0;
      font-size: 11px;
      color: var(--text);
    }
    .pkb-card p,
    .pkb-card div {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .pkb-content {
      white-space: pre-wrap;
      line-height: 1.65;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      max-height: 38vh;
      overflow-y: auto;
    }
    .pkb-doc-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pkb-empty {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.4;
    }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { width: 100%; min-height: auto; }
      .ops {
        position: static;
        width: 100%;
        min-height: 280px;
      }
      .layout {
        height: auto;
      }
      .pkb-overlay {
        padding: 10px;
      }
      .pkb-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(280px, 44vh) minmax(0, 1fr);
      }
      .pkb-panel {
        border-left: 0;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="layout">
  <div class="app">
    <div id="messages" class="messages"></div>
    <div class="composer">
      <textarea id="input" placeholder="Type a message..."></textarea>
      <button id="send" class="send">Send</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <aside class="ops">
    <div class="brand-panel">
      <p class="brand-name">N.A.I.M.A.<br/>next AI modular agent</p>
      <img class="brand-logo" src="/ui/logo2.png" alt="Naima logo">
    </div>
    <button id="openTopicsView" class="pkb-launch" type="button">Personal knowledge base</button>
    <div class="settings-panel section-panel">
      <div class="settings-head">
        <h3>Settings</h3>
        <button id="settingsCollapse" class="settings-collapse" type="button">Hide</button>
      </div>
      <div id="settingsBody" class="settings-body">
        <div class="theme-row">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="void">Void</option>
            <option value="void-light">Void Light</option>
            <option value="quantum">Quantum</option>
            <option value="quantum-light">Quantum Light</option>
          </select>
        </div>
        <input id="token" type="password" placeholder="API token (Bearer)" autocomplete="off">
        <button id="saveToken">Save token</button>
      </div>
    </div>
    <div class="tools-panel section-panel">
      <div class="tools-head">
        <p class="tools-title">Tools</p>
        <button id="toolsCollapse" class="tools-collapse" type="button">Hide</button>
      </div>
      <div id="toolsList" class="tools-list"></div>
    </div>
    <div class="memory-panel section-panel">
      <div class="memory-head">
        <p class="memory-title">Memory</p>
        <button id="memoryCollapse" class="memory-collapse" type="button">Hide</button>
      </div>
      <div id="memoryList" class="memory-list"></div>
    </div>
    <div class="operations-panel section-panel">
      <div class="ops-head">
        <h3>Operations</h3>
        <button id="opsCollapse" class="ops-collapse" type="button">Hide</button>
      </div>
      <ul id="opsList" class="ops-list"></ul>
    </div>
  </aside>
  </div>
  <div id="pkbOverlay" class="pkb-overlay is-hidden">
    <div class="pkb-shell">
      <div class="pkb-stage">
        <div class="pkb-toolbar">
          <span id="pkbSummary" class="pkb-badge">Personal knowledge base</span>
          <div class="pkb-toolbar-group">
            <button id="pkbZoomIn" type="button">Zoom in</button>
            <button id="pkbZoomOut" type="button">Zoom out</button>
            <button id="pkbRefresh" type="button">Refresh</button>
          </div>
        </div>
        <div id="pkbCanvas" class="pkb-canvas"></div>
      </div>
      <div class="pkb-panel">
        <div class="pkb-panel-head">
          <h3>Topics Space</h3>
          <button id="pkbClose" class="pkb-close" type="button">Close</button>
        </div>
        <div class="pkb-panel-body">
          <div id="pkbStats" class="pkb-stat-grid"></div>
          <div id="pkbDetail" class="pkb-card">
            <h4>Selection</h4>
            <p>Pick a building or document node to inspect it.</p>
          </div>
          <div id="pkbDocuments" class="pkb-doc-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script>
    const tokenEl = document.getElementById("token");
    const saveTokenBtn = document.getElementById("saveToken");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const themeSelectEl = document.getElementById("themeSelect");
    const settingsBodyEl = document.getElementById("settingsBody");
    const settingsCollapseEl = document.getElementById("settingsCollapse");
    const settingsPanelEl = document.querySelector(".settings-panel");
    const pkbShellEl = document.querySelector(".pkb-shell");
    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const opsListEl = document.getElementById("opsList");
    const opsCollapseEl = document.getElementById("opsCollapse");
    const operationsPanelEl = document.querySelector(".operations-panel");
    const toolsPanelEl = document.querySelector(".tools-panel");
    const toolsListEl = document.getElementById("toolsList");
    const toolsCollapseEl = document.getElementById("toolsCollapse");
    const openTopicsViewEl = document.getElementById("openTopicsView");
    const memoryPanelEl = document.querySelector(".memory-panel");
    const memoryListEl = document.getElementById("memoryList");
    const memoryCollapseEl = document.getElementById("memoryCollapse");
    const pkbOverlayEl = document.getElementById("pkbOverlay");
    const pkbCanvasEl = document.getElementById("pkbCanvas");
    const pkbCloseEl = document.getElementById("pkbClose");
    const pkbRefreshEl = document.getElementById("pkbRefresh");
    const pkbZoomInEl = document.getElementById("pkbZoomIn");
    const pkbZoomOutEl = document.getElementById("pkbZoomOut");
    const pkbSummaryEl = document.getElementById("pkbSummary");
    const pkbStatsEl = document.getElementById("pkbStats");
    const pkbDetailEl = document.getElementById("pkbDetail");
    const pkbDocumentsEl = document.getElementById("pkbDocuments");
    let newConversationOnNextSend = true;
    const pkbSceneState = {
      renderer: null,
      scene: null,
      camera: null,
      raycaster: null,
      pointer: null,
      resizeObserver: null,
      animationFrame: 0,
      drag: { active: false, x: 0, y: 0 },
      orbit: { yaw: 0.75, pitch: 0.55, radius: 28 },
      target: { currentX: 0, currentY: 2, currentZ: 0, goalX: 0, goalY: 2, goalZ: 0 },
      meshes: [],
      selected: null
    };

    const tokenKey = "naima_api_token";
    const themeKey = "naima_theme";
    const settingsCollapsedKey = "naima_settings_collapsed";
    const toolsCollapsedKey = "naima_tools_collapsed";
    const opsCollapsedKey = "naima_ops_collapsed";
    const memoryCollapsedKey = "naima_memory_collapsed";
    tokenEl.value = localStorage.getItem(tokenKey) || "";
    const savedTheme = normalizeTheme(localStorage.getItem(themeKey) || "void");
    themeSelectEl.value = savedTheme;
    applyTheme(themeSelectEl.value);

    saveTokenBtn.addEventListener("click", () => {
      localStorage.setItem(tokenKey, tokenEl.value.trim());
      setStatus("Token saved locally.");
      loadTools();
      loadMemoryStatus();
    });
    themeSelectEl.addEventListener("change", () => {
      const value = normalizeTheme(themeSelectEl.value);
      localStorage.setItem(themeKey, value);
      applyTheme(value);
    });

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    if (tokenEl.value.trim()) {
      resetMemoryOnRefresh();
      loadTools();
      loadMemoryStatus();
    } else {
      renderTools([]);
      renderMemoryStatus(null);
    }
    applyToolsCollapsed(localStorage.getItem(toolsCollapsedKey) === "1");
    applyOpsCollapsed(localStorage.getItem(opsCollapsedKey) === "1");
    applyMemoryCollapsed(localStorage.getItem(memoryCollapsedKey) === "1");
    applySettingsCollapsed(localStorage.getItem(settingsCollapsedKey) === "1");
    toolsCollapseEl.addEventListener("click", () => {
      const next = !toolsListEl.classList.contains("is-hidden");
      applyToolsCollapsed(next);
      localStorage.setItem(toolsCollapsedKey, next ? "1" : "0");
    });
    openTopicsViewEl.addEventListener("click", () => openPKBView(true));
    opsCollapseEl.addEventListener("click", () => {
      const next = !opsListEl.classList.contains("is-hidden");
      applyOpsCollapsed(next);
      localStorage.setItem(opsCollapsedKey, next ? "1" : "0");
    });
    settingsCollapseEl.addEventListener("click", () => {
      const next = !settingsBodyEl.classList.contains("is-hidden");
      applySettingsCollapsed(next);
      localStorage.setItem(settingsCollapsedKey, next ? "1" : "0");
    });
    memoryCollapseEl.addEventListener("click", () => {
      const next = !memoryListEl.classList.contains("is-hidden");
      applyMemoryCollapsed(next);
      localStorage.setItem(memoryCollapsedKey, next ? "1" : "0");
    });
    pkbCloseEl.addEventListener("click", closePKBView);
    pkbRefreshEl.addEventListener("click", () => openPKBView(true));
    pkbZoomInEl.addEventListener("click", () => {
      pkbSceneState.orbit.radius = Math.max(10, pkbSceneState.orbit.radius - 2.5);
    });
    pkbZoomOutEl.addEventListener("click", () => {
      pkbSceneState.orbit.radius = Math.min(54, pkbSceneState.orbit.radius + 2.5);
    });
    window.addEventListener("resize", () => {
      if (!pkbOverlayEl.classList.contains("is-hidden")) {
        resizePKBRenderer();
      }
    });
    pkbShellEl.addEventListener("transitionrun", () => {
      if (!pkbOverlayEl.classList.contains("is-hidden")) {
        requestAnimationFrame(resizePKBRenderer);
      }
    });
    pkbShellEl.addEventListener("transitionend", () => {
      if (!pkbOverlayEl.classList.contains("is-hidden")) {
        resizePKBRenderer();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !pkbOverlayEl.classList.contains("is-hidden")) {
        closePKBView();
      }
    });

    function addBubble(role, text) {
      const row = document.createElement("div");
      row.className = "row " + role;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function markdownToHtml(markdown) {
      let html = escapeHtml(markdown || "");

      html = html.replace(/```([\s\S]*?)```/g, (_, code) => {
        return "<pre><code>" + code.replace(/\n$/, "") + "</code></pre>";
      });
      html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
      html = html.replace(/~~([^~\n]+)~~/g, "<del>$1</del>");
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/^&gt;\s?(.*)$/gm, "<blockquote>$1</blockquote>");
      html = html.replace(/^\s*-\s+(.*)$/gm, "<li>$1</li>");
      html = html.replace(/(<li>[\s\S]*?<\/li>)/g, "<ul>$1</ul>");
      html = html.replace(/\n/g, "<br>");

      return html;
    }

    function renderMarkdownBubble(bubble, markdown) {
      bubble.innerHTML = markdownToHtml(markdown);
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function addOp(text) {
      const li = document.createElement("li");
      const t = document.createElement("span");
      t.className = "ops-time";
      t.textContent = new Date().toLocaleTimeString();
      li.appendChild(t);
      li.appendChild(document.createTextNode(text));
      opsListEl.appendChild(li);
      opsListEl.scrollTop = opsListEl.scrollHeight;
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + tokenEl.value.trim()
      };
    }

    async function fetchPKBGraph() {
      const resp = await fetch("/api/pkb/graph", {
        method: "GET",
        headers: { "Authorization": "Bearer " + tokenEl.value.trim() }
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(text || ("HTTP " + resp.status));
      }
      return resp.json();
    }

    async function loadTools() {
      const token = tokenEl.value.trim();
      if (!token) {
        renderTools([]);
        return;
      }
      try {
        const resp = await fetch("/api/tools", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          toolsListEl.innerHTML = "";
          return;
        }
        const payload = await resp.json();
        renderTools(Array.isArray(payload.tools) ? payload.tools : []);
      } catch (_) {
        toolsListEl.innerHTML = "";
      }
    }

    async function loadMemoryStatus() {
      const token = tokenEl.value.trim();
      if (!token) {
        renderMemoryStatus(null);
        return;
      }
      try {
        const resp = await fetch("/api/memory/status", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          renderMemoryStatus(null);
          return;
        }
        const payload = await resp.json();
        renderMemoryStatus(payload.status || null);
      } catch (_) {
        renderMemoryStatus(null);
      }
    }

    async function resetMemoryOnRefresh() {
      const token = tokenEl.value.trim();
      if (!token) {
        return;
      }
      try {
        const resp = await fetch("/api/memory/reset", {
          method: "POST",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          return;
        }
        addOp("memory reset (page refresh)");
      } catch (_) {
      }
    }

    function renderTools(tools) {
      toolsListEl.innerHTML = "";
      if (!tools.length) {
        const empty = document.createElement("div");
        empty.className = "tool-item";
        empty.textContent = tokenEl.value.trim() ? "No tools available." : "Save token to load tools.";
        toolsListEl.appendChild(empty);
        return;
      }
      for (const tool of tools) {
        const row = document.createElement("label");
        row.className = "tool-item";

        const left = document.createElement("div");
        left.style.minWidth = "0";
        const name = document.createElement("span");
        name.className = "tool-name";
        name.textContent = tool.name || "unknown";
        const desc = document.createElement("span");
        desc.className = "tool-desc";
        desc.textContent = tool.description || "";
        left.appendChild(name);
        left.appendChild(desc);

        const toggle = document.createElement("input");
        toggle.className = "tool-toggle";
        toggle.type = "checkbox";
        toggle.checked = !!tool.enabled;
        toggle.addEventListener("change", async () => {
          toggle.disabled = true;
          try {
            const resp = await fetch("/api/tools", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ name: tool.name, enabled: toggle.checked })
            });
            if (!resp.ok) {
              const t = await resp.text();
              throw new Error(t || ("HTTP " + resp.status));
            }
            const payload = await resp.json();
            renderTools(Array.isArray(payload.tools) ? payload.tools : []);
            addOp("tool " + tool.name + " " + (toggle.checked ? "enabled" : "disabled"));
          } catch (err) {
            toggle.checked = !toggle.checked;
            setStatus("Tool update failed: " + (err?.message || String(err)));
          } finally {
            toggle.disabled = false;
          }
        });

        row.appendChild(left);
        row.appendChild(toggle);
        toolsListEl.appendChild(row);
      }
    }

    function renderMemoryStatus(status) {
      memoryListEl.innerHTML = "";
      if (!status) {
        const empty = document.createElement("div");
        empty.className = "memory-item";
        empty.style.gridColumn = "1 / -1";
        empty.innerHTML = '<div class="memory-key">status</div><div class="memory-val">' + (tokenEl.value.trim() ? "unavailable" : "save token to load") + "</div>";
        memoryListEl.appendChild(empty);
        return;
      }
      const entries = [
        ["max", status.MaxContextSize],
        ["current", status.CurrentSize],
        ["pinned", status.PinnedCount],
        ["unpinned", status.UnpinnedCount],
        ["summaries", status.summary_messages ?? status.SummaryMessages ?? 0],
        ["recalled", status.recall_messages ?? status.RecallMessages ?? 0],
        ["summarizer", status.HasSummarizer ? "yes" : "no"],
        ["pending_recall", status.HasPendingRecall ? "yes" : "no"]
      ];
      for (const [k, v] of entries) {
        const item = document.createElement("div");
        item.className = "memory-item";
        const key = document.createElement("div");
        key.className = "memory-key";
        key.textContent = k;
        const val = document.createElement("div");
        val.className = "memory-val";
        val.textContent = String(v);
        item.appendChild(key);
        item.appendChild(val);
        memoryListEl.appendChild(item);
      }
    }

    function renderPKBStats(topics) {
      const topicCount = topics.length;
      const docCount = topics.reduce((sum, topic) => sum + ((topic.documents_list || []).length), 0);
      const biggest = topics.reduce((max, topic) => Math.max(max, (topic.documents_list || []).length), 0);
      const stats = [
        ["topics", topicCount],
        ["documents", docCount],
        ["largest topic", biggest],
        ["selection", pkbSceneState.selected ? pkbSceneState.selected.kind : "none"]
      ];
      pkbStatsEl.innerHTML = "";
      for (const [key, value] of stats) {
        const card = document.createElement("div");
        card.className = "pkb-stat";
        card.innerHTML = '<div class="pkb-stat-key">' + escapeHtml(String(key)) + '</div><div class="pkb-stat-val">' + escapeHtml(String(value)) + "</div>";
        pkbStatsEl.appendChild(card);
      }
    }

    function renderPKBSelection(meta) {
      pkbSceneState.selected = meta || null;
      pkbShellEl.classList.toggle("has-selection", !!meta);
      if (meta && meta.focus) {
        setPKBTarget(meta.focus.x, meta.focus.y, meta.focus.z);
      } else {
        setPKBTarget(0, 2, 0);
      }
      requestAnimationFrame(resizePKBRenderer);
      if (!meta) {
        pkbDetailEl.innerHTML = "<h4>Selection</h4><p>Pick a building or document node to inspect it.</p>";
        pkbDocumentsEl.innerHTML = "";
        return;
      }

      if (meta.kind === "topic") {
        const firstLink = (meta.topic.documents_list || []).find((doc) => doc.source_url);
        pkbDetailEl.innerHTML =
          "<h4>" + escapeHtml(meta.topic.title) + "</h4>" +
          "<p>Topic building with " + escapeHtml(String((meta.topic.documents_list || []).length)) + " document(s).</p>" +
          "<p>Created: " + escapeHtml(formatDate(meta.topic.created_at)) + "</p>" +
          (firstLink ? '<p><a href="' + encodeURI(firstLink.source_url) + '" target="_blank" rel="noopener noreferrer">Open a source from this topic</a></p>' : "");
        renderPKBDocuments(meta.topic.documents_list || []);
      } else {
        const doc = meta.document;
        const topicDocs = Array.isArray(meta.topic.documents_list) ? meta.topic.documents_list : [];
        const relatedDocs = topicDocs.filter((item) => Number(item.id) !== Number(doc.id));
        pkbDetailEl.innerHTML =
          "<h4>" + escapeHtml(doc.title || "(untitled document)") + "</h4>" +
          "<p>Topic: " + escapeHtml(doc.topic_title || meta.topic.title) + "</p>" +
          "<p>Kind: " + escapeHtml(doc.kind || "note") + "</p>" +
          (doc.source_url ? '<p><a href="' + encodeURI(doc.source_url) + '" target="_blank" rel="noopener noreferrer">Open source</a></p>' : "") +
          '<div class="pkb-content">' + formatReadableContent(doc.content || "") + "</div>";
        renderPKBDocuments(relatedDocs);
      }
      renderPKBStats(pkbSceneState.currentTopics || []);
    }

    function renderPKBDocuments(documents) {
      pkbDocumentsEl.innerHTML = "";
      if (!documents.length) {
        pkbDocumentsEl.innerHTML = '<div class="pkb-empty">No documents in this selection.</div>';
        return;
      }
      for (const doc of documents) {
        const card = document.createElement("div");
        card.className = "pkb-card is-clickable";
        card.innerHTML =
          "<h4>" + escapeHtml(doc.title || "(untitled document)") + "</h4>" +
          "<p>" + escapeHtml(doc.kind || "note") + "</p>" +
          (doc.source_url ? '<p><a href="' + encodeURI(doc.source_url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(doc.source_url) + "</a></p>" : "") +
          "<div>" + escapeHtml(trimText(doc.content || "", 260)) + "</div>";
        card.addEventListener("click", (event) => {
          if (event.target && event.target.closest("a")) {
            return;
          }
          const topic = (pkbSceneState.currentTopics || []).find((item) => Number(item.id) === Number(doc.topic_id)) || {
            title: doc.topic_title || "",
            documents_list: documents
          };
          renderPKBSelection({ kind: "document", topic, document: doc });
        });
        pkbDocumentsEl.appendChild(card);
      }
    }

    function trimText(text, max) {
      const value = String(text || "").trim();
      if (value.length <= max) {
        return value;
      }
      return value.slice(0, max - 1).trimEnd() + "…";
    }

    function formatDate(value) {
      if (!value) {
        return "n/a";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }
      return date.toLocaleString();
    }

    function formatReadableContent(text) {
      return escapeHtml(String(text || "").trim())
        .replace(/\n{3,}/g, "\n\n")
        .replace(/\n/g, "<br>");
    }

    function colorHex(name, fallback) {
      const raw = getComputedStyle(document.body).getPropertyValue(name).trim() || fallback;
      return parseInt(raw.replace("#", ""), 16);
    }

    function ensurePKBScene() {
      if (pkbSceneState.renderer || !window.THREE) {
        return;
      }
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      pkbCanvasEl.innerHTML = "";
      pkbCanvasEl.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();

      const ambient = new THREE.AmbientLight(0xffffff, 1.15);
      scene.add(ambient);
      const key = new THREE.DirectionalLight(0xffffff, 1.8);
      key.position.set(12, 20, 10);
      scene.add(key);
      const fill = new THREE.PointLight(colorHex("--accent", "#3DF2E0"), 14, 120);
      fill.position.set(0, 18, 0);
      scene.add(fill);

      const ground = new THREE.Mesh(
        new THREE.CylinderGeometry(18, 22, 0.8, 48),
        new THREE.MeshStandardMaterial({
          color: colorHex("--surface", "#0b1118"),
          metalness: 0.4,
          roughness: 0.7
        })
      );
      ground.position.y = -0.6;
      scene.add(ground);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(14, 0.08, 12, 80),
        new THREE.MeshStandardMaterial({ color: colorHex("--border", "#1f3f4b") })
      );
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      pkbSceneState.renderer = renderer;
      pkbSceneState.scene = scene;
      pkbSceneState.camera = camera;
      pkbSceneState.raycaster = raycaster;
      pkbSceneState.pointer = pointer;

      renderer.domElement.addEventListener("pointerdown", onPKBPointerDown);
      renderer.domElement.addEventListener("pointermove", onPKBPointerMove);
      renderer.domElement.addEventListener("pointerup", onPKBPointerUp);
      renderer.domElement.addEventListener("pointerleave", onPKBPointerUp);
      renderer.domElement.addEventListener("wheel", onPKBWheel, { passive: false });
      renderer.domElement.addEventListener("click", onPKBClick);
      if (typeof ResizeObserver !== "undefined") {
        pkbSceneState.resizeObserver = new ResizeObserver(() => {
          if (!pkbOverlayEl.classList.contains("is-hidden")) {
            resizePKBRenderer();
          }
        });
        pkbSceneState.resizeObserver.observe(pkbCanvasEl);
      }

      resizePKBRenderer();
      tickPKBScene();
    }

    function resizePKBRenderer() {
      if (!pkbSceneState.renderer || !pkbCanvasEl.clientWidth || !pkbCanvasEl.clientHeight) {
        return;
      }
      pkbSceneState.renderer.setSize(pkbCanvasEl.clientWidth, pkbCanvasEl.clientHeight);
      pkbSceneState.camera.aspect = pkbCanvasEl.clientWidth / pkbCanvasEl.clientHeight;
      pkbSceneState.camera.updateProjectionMatrix();
      updatePKBCamera();
    }

    function updatePKBCamera() {
      if (!pkbSceneState.camera) {
        return;
      }
      const target = pkbSceneState.target;
      target.currentX += (target.goalX - target.currentX) * 0.12;
      target.currentY += (target.goalY - target.currentY) * 0.12;
      target.currentZ += (target.goalZ - target.currentZ) * 0.12;
      const { yaw, pitch, radius } = pkbSceneState.orbit;
      const x = target.currentX + Math.cos(yaw) * Math.cos(pitch) * radius;
      const y = target.currentY + Math.sin(pitch) * radius * 0.9 + 5;
      const z = target.currentZ + Math.sin(yaw) * Math.cos(pitch) * radius;
      pkbSceneState.camera.position.set(x, y, z);
      pkbSceneState.camera.lookAt(target.currentX, target.currentY, target.currentZ);
    }

    function setPKBTarget(x, y, z) {
      pkbSceneState.target.goalX = Number(x) || 0;
      pkbSceneState.target.goalY = Number(y) || 2;
      pkbSceneState.target.goalZ = Number(z) || 0;
    }

    function clearPKBMeshes() {
      if (!pkbSceneState.scene) {
        return;
      }
      for (const mesh of pkbSceneState.meshes) {
        pkbSceneState.scene.remove(mesh);
        if (mesh.geometry) {
          mesh.geometry.dispose();
        }
        if (mesh.material && mesh.material.map && typeof mesh.material.map.dispose === "function") {
          mesh.material.map.dispose();
        }
        if (mesh.material && typeof mesh.material.dispose === "function") {
          mesh.material.dispose();
        }
      }
      pkbSceneState.meshes = [];
    }

    function createTopicLabelSprite(text, scaleFactor) {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const raw = String(text || "").trim() || "Untitled";
      const label = raw.length > 20 ? raw.slice(0, 19).trimEnd() + "…" : raw;
      const fontSize = 18;
      ctx.font = "600 " + fontSize + "px 'Kode Mono', monospace";
      const textWidth = Math.ceil(ctx.measureText(label).width);
      canvas.width = Math.max(72, textWidth + 18);
      canvas.height = 32;

      ctx.font = "600 " + fontSize + "px 'Kode Mono', monospace";
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(11, 15, 20, 0.78)";
      ctx.strokeStyle = "rgba(61, 242, 224, 0.55)";
      ctx.lineWidth = 1.5;
      const radius = 8;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(canvas.width - radius, 0);
      ctx.quadraticCurveTo(canvas.width, 0, canvas.width, radius);
      ctx.lineTo(canvas.width, canvas.height - radius);
      ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - radius, canvas.height);
      ctx.lineTo(radius, canvas.height);
      ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#E8FFFC";
      ctx.fillText(label, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        depthTest: false
      });
      const sprite = new THREE.Sprite(material);
      const aspect = canvas.width / canvas.height;
      const size = 1.35 * (scaleFactor || 1);
      sprite.scale.set(size * aspect, size, 1);
      sprite.renderOrder = 10;
      return sprite;
    }

    function buildPKBScene(topics) {
      ensurePKBScene();
      clearPKBMeshes();
      pkbSceneState.currentTopics = topics;
      renderPKBStats(topics);
      renderPKBSelection(null);

      const topicCount = topics.length;
      pkbSummaryEl.textContent = topicCount + " topic(s) in personal knowledge base";
      if (!topicCount) {
        return;
      }

      const cols = Math.max(1, Math.ceil(Math.sqrt(topicCount)));
      const spacing = 7.2;
      const startX = -((cols - 1) * spacing) / 2;
      const topicColor = colorHex("--accent", "#3DF2E0");
      const docColor = colorHex("--muted", "#7adbd2");
      const borderColor = colorHex("--border", "#1f3f4b");
      const labelScale = Math.max(0.42, Math.min(0.72, 6 / Math.max(topicCount, 6)));

      topics.forEach((topic, index) => {
        const row = Math.floor(index / cols);
        const col = index % cols;
        const x = startX + col * spacing;
        const z = (row - Math.floor((topicCount - 1) / cols / 2)) * spacing;
        const docs = Array.isArray(topic.documents_list) ? topic.documents_list : [];
        const height = 2 + Math.max(0, docs.length) * 0.65;
        const building = new THREE.Mesh(
          new THREE.BoxGeometry(2.4, height, 2.4),
          new THREE.MeshStandardMaterial({
            color: topicColor,
            emissive: borderColor,
            emissiveIntensity: 0.12,
            metalness: 0.35,
            roughness: 0.4
          })
        );
        building.position.set(x, height / 2, z);
        building.userData = { kind: "topic", topic, focus: { x, y: Math.max(2, height / 2), z } };
        pkbSceneState.scene.add(building);
        pkbSceneState.meshes.push(building);

        const label = createTopicLabelSprite(topic.title, labelScale);
        label.position.set(x, height + 0.7 + labelScale, z);
        pkbSceneState.scene.add(label);
        pkbSceneState.meshes.push(label);

        docs.forEach((doc, docIndex) => {
          const angle = (Math.PI * 2 * docIndex) / Math.max(docs.length, 1);
          const radius = 2.8 + (docIndex % 3) * 0.5;
          const docHeight = 0.7 + Math.min(1.8, (doc.content || "").length / 900);
          const node = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, docHeight, 0.8),
            new THREE.MeshStandardMaterial({
              color: docColor,
              emissive: topicColor,
              emissiveIntensity: 0.08,
              metalness: 0.15,
              roughness: 0.55
            })
          );
          node.position.set(
            x + Math.cos(angle) * radius,
            docHeight / 2,
            z + Math.sin(angle) * radius
          );
          node.userData = {
            kind: "document",
            topic,
            document: doc,
            focus: { x: node.position.x, y: Math.max(1.6, node.position.y), z: node.position.z }
          };
          pkbSceneState.scene.add(node);
          pkbSceneState.meshes.push(node);
        });
      });
    }

    function tickPKBScene() {
      if (!pkbSceneState.renderer) {
        return;
      }
      updatePKBCamera();
      pkbSceneState.renderer.render(pkbSceneState.scene, pkbSceneState.camera);
      pkbSceneState.animationFrame = requestAnimationFrame(tickPKBScene);
    }

    function onPKBPointerDown(event) {
      pkbSceneState.drag.active = true;
      pkbSceneState.drag.x = event.clientX;
      pkbSceneState.drag.y = event.clientY;
      pkbCanvasEl.classList.add("dragging");
    }

    function onPKBPointerMove(event) {
      if (!pkbSceneState.drag.active) {
        return;
      }
      const dx = event.clientX - pkbSceneState.drag.x;
      const dy = event.clientY - pkbSceneState.drag.y;
      pkbSceneState.drag.x = event.clientX;
      pkbSceneState.drag.y = event.clientY;
      pkbSceneState.orbit.yaw -= dx * 0.008;
      pkbSceneState.orbit.pitch = Math.max(0.15, Math.min(1.2, pkbSceneState.orbit.pitch - dy * 0.008));
    }

    function onPKBPointerUp() {
      pkbSceneState.drag.active = false;
      pkbCanvasEl.classList.remove("dragging");
    }

    function onPKBWheel(event) {
      event.preventDefault();
      pkbSceneState.orbit.radius = Math.max(10, Math.min(54, pkbSceneState.orbit.radius + event.deltaY * 0.015));
    }

    function onPKBClick(event) {
      if (!pkbSceneState.renderer || !pkbSceneState.camera) {
        return;
      }
      const rect = pkbSceneState.renderer.domElement.getBoundingClientRect();
      pkbSceneState.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pkbSceneState.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      pkbSceneState.raycaster.setFromCamera(pkbSceneState.pointer, pkbSceneState.camera);
      const hits = pkbSceneState.raycaster.intersectObjects(pkbSceneState.meshes.filter((mesh) => mesh.userData && mesh.userData.kind), false);
      if (!hits.length) {
        renderPKBSelection(null);
        return;
      }
      renderPKBSelection(hits[0].object.userData);
    }

    async function openPKBView(forceRefresh) {
      if (!tokenEl.value.trim()) {
        setStatus("Set API token first.");
        return;
      }
      try {
        if (forceRefresh) {
          addOp("refreshing topics view");
        }
        const payload = await fetchPKBGraph();
        const topics = Array.isArray(payload.topics) ? payload.topics : [];
        pkbOverlayEl.classList.remove("is-hidden");
        pkbShellEl.classList.remove("has-selection");
        buildPKBScene(topics);
        resizePKBRenderer();
        addOp("topics view opened");
        setStatus("Topics space ready.");
      } catch (err) {
        setStatus("Topics view failed: " + (err?.message || String(err)));
      }
    }

    function closePKBView() {
      pkbOverlayEl.classList.add("is-hidden");
      pkbShellEl.classList.remove("has-selection");
      addOp("topics view closed");
    }

    function applyToolsCollapsed(collapsed) {
      toolsListEl.classList.toggle("is-hidden", !!collapsed);
      openTopicsViewEl.classList.toggle("is-hidden", !!collapsed);
      toolsPanelEl.classList.toggle("collapsed", !!collapsed);
      toolsCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    function applyOpsCollapsed(collapsed) {
      opsListEl.classList.toggle("is-hidden", !!collapsed);
      operationsPanelEl.classList.toggle("collapsed", !!collapsed);
      opsCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    function applyTheme(theme) {
      const normalized = normalizeTheme(theme);
      document.body.classList.remove("theme-void", "theme-void-light", "theme-quantum", "theme-quantum-light");
      document.body.classList.add("theme-" + normalized);
    }

    function normalizeTheme(value) {
      const v = (value || "").toLowerCase();
      if (v === "quantum" || v === "void-light" || v === "quantum-light") {
        return v;
      }
      return "void";
    }

    function applyMemoryCollapsed(collapsed) {
      memoryListEl.classList.toggle("is-hidden", !!collapsed);
      memoryPanelEl.classList.toggle("collapsed", !!collapsed);
      memoryCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    function applySettingsCollapsed(collapsed) {
      settingsBodyEl.classList.toggle("is-hidden", !!collapsed);
      settingsPanelEl.classList.toggle("collapsed", !!collapsed);
      settingsCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    async function sendMessage() {
      const token = tokenEl.value.trim();
      const message = inputEl.value.trim();
      if (!token) {
        setStatus("Set API token first.");
        return;
      }
      if (!message) {
        return;
      }

      addBubble("user", message);
      addOp("message queued");
      inputEl.value = "";
      sendBtn.disabled = true;
      setStatus("Streaming response...");

      const aiBubble = addBubble("ai", "");
      let aiRaw = "";
      const payload = {
        message,
        new_conversation: newConversationOnNextSend
      };
      newConversationOnNextSend = false;

      try {
        const resp = await fetch("/api/messages/stream", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });

        if (!resp.ok || !resp.body) {
          const text = await resp.text();
          throw new Error(text || ("HTTP " + resp.status));
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let done = false;
        const streamState = { doneEvent: false, errorEvent: false };

        while (!done) {
          const chunk = await reader.read();
          done = chunk.done;
          buffer += decoder.decode(chunk.value || new Uint8Array(), { stream: !done });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) >= 0) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            aiRaw = handleSSE(rawEvent, aiBubble, aiRaw, streamState);
          }
        }

        if (streamState.errorEvent) {
          setStatus("Request failed.");
          loadMemoryStatus();
        } else if (!streamState.doneEvent) {
          const msg = "Stream interrupted before completion.";
          if (!aiRaw) {
            aiRaw = "Error: " + msg;
            renderMarkdownBubble(aiBubble, aiRaw);
          }
          addOp("error: " + msg);
          setStatus(msg);
          loadMemoryStatus();
        } else {
          setStatus("Done.");
          loadMemoryStatus();
        }
      } catch (err) {
        setStatus("Stream error: " + (err?.message || String(err)));
      } finally {
        sendBtn.disabled = false;
      }
    }

    function handleSSE(raw, aiBubble, aiRaw, streamState) {
      const lines = raw.split("\n");
      let event = "";
      let data = "";
      for (const line of lines) {
        if (line.startsWith("event:")) {
          event = line.slice(6).trim();
        } else if (line.startsWith("data:")) {
          data += line.slice(5).trim();
        }
      }
      if (!data) return aiRaw;

      let payload;
      try {
        payload = JSON.parse(data);
      } catch (_) {
        return aiRaw;
      }

      if (event === "delta" && payload.content) {
        aiRaw += payload.content;
        renderMarkdownBubble(aiBubble, aiRaw);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } else if (event === "op" && payload.content) {
        addOp(payload.content);
      } else if (event === "done") {
        streamState.doneEvent = true;
        if (!aiRaw && payload.content) {
          aiRaw = payload.content;
          renderMarkdownBubble(aiBubble, aiRaw);
        }
        addOp("response completed");
      } else if (event === "error") {
        streamState.errorEvent = true;
        aiRaw = "Error: " + (payload.error || "unknown");
        renderMarkdownBubble(aiBubble, aiRaw);
        addOp("error: " + (payload.error || "unknown"));
      }
      return aiRaw;
    }
  </script>

            kind: "document",
            topic,
            document: doc,
            focus: { x: node.position.x, y: Math.max(1.6, node.position.y), z: node.position.z }
          };
          pkbSceneState.scene.add(node);
          pkbSceneState.meshes.push(node);
        });
      });
    }

    function tickPKBScene() {
      if (!pkbSceneState.renderer) {
        return;
      }
      updatePKBCamera();
      pkbSceneState.renderer.render(pkbSceneState.scene, pkbSceneState.camera);
      pkbSceneState.animationFrame = requestAnimationFrame(tickPKBScene);
    }

    function onPKBPointerDown(event) {
      pkbSceneState.drag.active = true;
      pkbSceneState.drag.x = event.clientX;
      pkbSceneState.drag.y = event.clientY;
      pkbCanvasEl.classList.add("dragging");
    }

    function onPKBPointerMove(event) {
      if (!pkbSceneState.drag.active) {
        return;
      }
      const dx = event.clientX - pkbSceneState.drag.x;
      const dy = event.clientY - pkbSceneState.drag.y;
      pkbSceneState.drag.x = event.clientX;
      pkbSceneState.drag.y = event.clientY;
      pkbSceneState.orbit.yaw -= dx * 0.008;
      pkbSceneState.orbit.pitch = Math.max(0.15, Math.min(1.2, pkbSceneState.orbit.pitch - dy * 0.008));
    }

    function onPKBPointerUp() {
      pkbSceneState.drag.active = false;
      pkbCanvasEl.classList.remove("dragging");
    }

    function onPKBWheel(event) {
      event.preventDefault();
      pkbSceneState.orbit.radius = Math.max(10, Math.min(54, pkbSceneState.orbit.radius + event.deltaY * 0.015));
    }

    function onPKBClick(event) {
      if (!pkbSceneState.renderer || !pkbSceneState.camera) {
        return;
      }
      const rect = pkbSceneState.renderer.domElement.getBoundingClientRect();
      pkbSceneState.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pkbSceneState.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      pkbSceneState.raycaster.setFromCamera(pkbSceneState.pointer, pkbSceneState.camera);
      const hits = pkbSceneState.raycaster.intersectObjects(pkbSceneState.meshes.filter((mesh) => mesh.userData && mesh.userData.kind), false);
      if (!hits.length) {
        renderPKBSelection(null);
        return;
      }
      renderPKBSelection(hits[0].object.userData);
    }

    async function submitIngest() {
      const mode = ingestModeEl.value === "file" ? "file" : "url";
      const file = ingestFileEl.files && ingestFileEl.files[0] ? ingestFileEl.files[0] : null;
      const url = ingestURLEl.value.trim();
      const selectedTopic = ingestTopicSelectEl.value;
      const newTopic = ingestNewTopicEl.value.trim();
      if (mode === "file" && !file) {
        setStatus("Document file is required.");
        return;
      }
      if (mode === "url" && !url) {
        setStatus("URL is required.");
        return;
      }
      if (!selectedTopic) {
        setStatus("Select a topic or create a new one.");
        return;
      }
      if (selectedTopic === "__new__" && !newTopic) {
        setStatus("New topic is required.");
        return;
      }

      setIngestBusy(true, mode === "file" ? "Uploading document and extracting with Tika..." : "Fetching and ingesting URL...");
      try {
        let result;
        if (mode === "file") {
          const payload = new FormData();
          payload.append("file", file);
          if (selectedTopic === "__new__") {
            payload.append("new_topic", newTopic);
          } else {
            payload.append("topic_id", selectedTopic);
          }
          result = await ingestFile(payload);
        } else {
          const payload = { url };
          if (selectedTopic === "__new__") {
            payload.new_topic = newTopic;
          } else {
            payload.topic_id = Number(selectedTopic);
          }
          result = await ingestURL(payload);
        }
        closeIngestDialog();
        addOp((mode === "file" ? "document" : "url") + " ingested into personal knowledge base");
        setStatus("Content ingested via " + (result.ingest_method || "unknown") + ".");
        if (currentMainTab() === "pkb") {
          await openPKBView(true);
        }
      } catch (err) {
        setIngestBusy(false, "Processing failed.");
        setStatus("Ingest failed: " + (err?.message || String(err)));
      } finally {
        if (!ingestDialogEl.classList.contains("is-hidden")) {
          setIngestBusy(false, "");
        }
      }
    }

    function stopCurrentMessage() {

    async function sendMessage() {
      if (isSendingMessage) {
        return;
      }

      const token = tokenEl.value.trim();
      const message = inputEl.value.trim();
      if (!token) {
        setStatus("Set API token first.");
        return;
      }
      if (!message) {
        return;
      }

      addBubble("user", message);
      addOp("message queued");
      inputEl.value = "";
      setMessageSendingState(true);
      setStatus("Streaming response...");

      const aiBubble = addBubble("ai", "");
      let aiRaw = "";
      currentMessageController = new AbortController();
      const payload = {
        message: buildScopedMessage(message),
        new_conversation: newConversationOnNextSend
      };
      newConversationOnNextSend = false;

      try {
        const resp = await fetch("/api/messages/stream", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(payload),
          signal: currentMessageController.signal
        });

        if (!resp.ok || !resp.body) {
          const text = await resp.text();
          throw new Error(text || ("HTTP " + resp.status));
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let done = false;
        const streamState = { doneEvent: false, errorEvent: false };

        while (!done) {
          const chunk = await reader.read();
          done = chunk.done;
          buffer += decoder.decode(chunk.value || new Uint8Array(), { stream: !done });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) >= 0) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            aiRaw = handleSSE(rawEvent, aiBubble, aiRaw, streamState);
          }
        }

        if (streamState.errorEvent) {
          setStatus("Request failed.");
          loadMemoryStatus();
        } else if (!streamState.doneEvent) {
          const msg = "Stream interrupted before completion.";
          if (!aiRaw) {
            aiRaw = "Error: " + msg;
            renderMarkdownBubble(aiBubble, aiRaw);
          }
          addOp("error: " + msg);
          setStatus(msg);
          loadMemoryStatus();
        } else {
          setStatus("Done.");
          loadMemoryStatus();
        }
      } catch (err) {
        if (err?.name === "AbortError") {
          addOp("request canceled");
          if (!aiRaw) {
            aiRaw = "Canceled.";
            renderMarkdownBubble(aiBubble, aiRaw);
          }
          setStatus("Canceled.");
        } else {
          setStatus("Stream error: " + (err?.message || String(err)));
        }
      } finally {
        currentMessageController = null;
        setMessageSendingState(false);
      }
    }

    function handleSSE(raw, aiBubble, aiRaw, streamState) {
      const lines = raw.split("\n");
      let event = "";
      let data = "";
      for (const line of lines) {
        if (line.startsWith("event:")) {
          event = line.slice(6).trim();
        } else if (line.startsWith("data:")) {
          data += line.slice(5).trim();
        }
      }
      if (!data) return aiRaw;

      let payload;
      try {
        payload = JSON.parse(data);
      } catch (_) {
        return aiRaw;
      }

      if (event === "delta" && payload.content) {
        aiRaw += payload.content;
        renderMarkdownBubble(aiBubble, aiRaw);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } else if (event === "op" && payload.content) {
        addOp(payload.content);
      } else if (event === "done") {
        streamState.doneEvent = true;
        if (!aiRaw && payload.content) {
          aiRaw = payload.content;
          renderMarkdownBubble(aiBubble, aiRaw);
        }
        addOp("response completed");
      } else if (event === "error") {
        streamState.errorEvent = true;
        aiRaw = "Error: " + (payload.error || "unknown");
        renderMarkdownBubble(aiBubble, aiRaw);
        addOp("error: " + (payload.error || "unknown"));
      }
      return aiRaw;
    }
  </script>

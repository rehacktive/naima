<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naima Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0F14;
      --panel: #101720;
      --text: #3DF2E0;
      --muted: #7adbd2;
      --accent: #3DF2E0;
      --accent-2: #2bc4b5;
      --bubble-user: #132a34;
      --bubble-ai: #0f1f2a;
      --border: #1f3f4b;
      --ops-bg: #0d141c;
      --ops-top-bg: #0a1219;
      --surface: #0b1118;
      --surface-2: #101a24;
      --send-fg: #0B0F14;
    }
    body.theme-quantum {
      --bg: #0E2A47;
      --panel: #102d4b;
      --text: #d4c8ff;
      --muted: #b8a6ff;
      --accent: #a88cff;
      --accent-2: #8b6dff;
      --bubble-user: #173a60;
      --bubble-ai: #122f4d;
      --border: #6e6fc9;
      --ops-bg: #102f50;
      --ops-top-bg: #0f2a45;
      --surface: #16395d;
      --surface-2: #1b4067;
      --send-fg: #0e1f34;
    }
    body.theme-void-light {
      --bg: #3DF2E0;
      --panel: #d7fffa;
      --text: #0B0F14;
      --muted: #20343f;
      --accent: #0B0F14;
      --accent-2: #1e2a36;
      --bubble-user: #baf7ef;
      --bubble-ai: #cffff7;
      --border: #2e5662;
      --ops-bg: #e9fffc;
      --ops-top-bg: #dcfffb;
      --surface: #f5fffd;
      --surface-2: #d5f7f2;
      --send-fg: #3DF2E0;
    }
    body.theme-quantum-light {
      --bg: #d4c8ff;
      --panel: #efe8ff;
      --text: #0E2A47;
      --muted: #2c4360;
      --accent: #0E2A47;
      --accent-2: #244a73;
      --bubble-user: #e5dcff;
      --bubble-ai: #f2edff;
      --border: #4e5f8f;
      --ops-bg: #f1ebff;
      --ops-top-bg: #e8dfff;
      --surface: #faf7ff;
      --surface-2: #e8dcff;
      --send-fg: #8A6CFF;
    }
    * {
      box-sizing: border-box;
      font-family: "Kode Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      font-size: 72.9%;
    }
    .layout {
      width: 100%;
      height: 100vh;
    }
    .app {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-left: 1px solid var(--border);
      height: 100vh;
      width: calc(100% - 380px);
      overflow: hidden;
    }
    .ops {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 380px;
      border-left: 1px solid var(--border);
      background: var(--ops-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 8px;
      gap: 8px;
    }
    .section-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 8px;
      display: flex;
      flex-direction: column;
    }
    .section-panel.collapsed {
      min-height: 0;
    }
    .ops-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .ops-head h3 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .operations-panel.collapsed .ops-head {
      margin-bottom: 0;
    }
    .ops-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .ops-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
    }
    .ops-list li {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text);
      background: var(--surface);
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ops-time {
      display: inline-block;
      color: var(--muted);
      font-size: 9px;
      margin-right: 6px;
    }
    a {
      color: #58f8ea;
      text-decoration-color: #2bc4b5;
    }
    a:visited {
      color: #4fd2c8;
      text-decoration-color: #2aa39a;
    }
    a:hover {
      color: #7ffdf1;
      text-decoration-color: #7ffdf1;
    }
    a:active {
      color: #36cfc1;
    }
    .settings-panel {
      min-height: 0;
    }
    .brand-panel {
      border-bottom: 1px solid var(--border);
      background: var(--ops-top-bg);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }
    .brand-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      flex: 0 0 auto;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .brand-name {
      margin: 0;
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.03em;
      font-weight: 600;
      text-align: right;
    }
    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .settings-panel.collapsed .settings-head {
      margin-bottom: 0;
    }
    .settings-head h3 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .settings-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .settings-body {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 26vh;
      overflow-y: auto;
    }
    .theme-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .theme-row label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .theme-row select {
      width: 100%;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
    }
    .settings-body input[type="password"] {
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 11px;
      background: var(--surface);
      color: var(--text);
    }
    .settings-body button {
      height: 36px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      padding: 0 10px;
      cursor: pointer;
      font-size: 11px;
    }
    .tools-panel {
      min-height: 190px;
    }
    .tools-panel.collapsed {
      min-height: 0;
    }
    .tools-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .tools-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }
    .tools-panel.collapsed .tools-head {
      margin-bottom: 0;
    }
    .tools-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .memory-panel {
      min-height: 120px;
    }
    .memory-panel.collapsed {
      min-height: 0;
    }
    .memory-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }
    .memory-panel.collapsed .memory-head {
      margin-bottom: 0;
    }
    .memory-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .memory-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .operations-panel {
      min-height: 0;
      flex: 1;
    }
    .memory-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .memory-item {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      background: var(--ops-bg);
      min-width: 0;
    }
    .memory-key {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .memory-val {
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .tools-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
    }
    .is-hidden {
      display: none !important;
    }
    .tool-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 7px;
      background: var(--ops-bg);
    }
    .tool-name {
      color: var(--text);
      font-weight: 600;
      margin-right: 6px;
    }
    .tool-desc {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .tool-toggle {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row {
      display: flex;
      width: 100%;
    }
    .row.user { justify-content: flex-end; }
    .row.ai { justify-content: flex-start; }
    .bubble {
      max-width: min(86%, 760px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 13px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.25);
    }
    .user .bubble {
      background: var(--bubble-user);
      border-color: var(--border);
    }
    .ai .bubble {
      background: var(--bubble-ai);
    }
    .composer {
      border-top: 1px solid var(--border);
      background: var(--ops-bg);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      flex-shrink: 0;
    }
    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
    }
    .send {
      height: 44px;
      min-width: 90px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: var(--send-fg);
      font-weight: 600;
      cursor: pointer;
    }
    .send:disabled {
      background: #9abbe0;
      cursor: not-allowed;
    }
    .status {
      font-size: 10px;
      color: var(--muted);
      padding: 0 12px 8px;
      min-height: 18px;
      flex-shrink: 0;
    }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { width: 100%; min-height: auto; }
      .ops {
        position: static;
        width: 100%;
        min-height: 280px;
      }
      .layout {
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
  <div class="app">
    <div id="messages" class="messages"></div>
    <div class="composer">
      <textarea id="input" placeholder="Type a message..."></textarea>
      <button id="send" class="send">Send</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <aside class="ops">
    <div class="brand-panel">
      <p class="brand-name">N.A.I.M.A.<br/>next AI modular agent</p>
      <img class="brand-logo" src="/ui/logo2.png" alt="Naima logo">
    </div>
    <div class="settings-panel section-panel">
      <div class="settings-head">
        <h3>Settings</h3>
        <button id="settingsCollapse" class="settings-collapse" type="button">Hide</button>
      </div>
      <div id="settingsBody" class="settings-body">
        <div class="theme-row">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="void">Void</option>
            <option value="void-light">Void Light</option>
            <option value="quantum">Quantum</option>
            <option value="quantum-light">Quantum Light</option>
          </select>
        </div>
        <input id="token" type="password" placeholder="API token (Bearer)" autocomplete="off">
        <button id="saveToken">Save token</button>
      </div>
    </div>
    <div class="tools-panel section-panel">
      <div class="tools-head">
        <p class="tools-title">Tools</p>
        <button id="toolsCollapse" class="tools-collapse" type="button">Hide</button>
      </div>
      <div id="toolsList" class="tools-list"></div>
    </div>
    <div class="memory-panel section-panel">
      <div class="memory-head">
        <p class="memory-title">Memory</p>
        <button id="memoryCollapse" class="memory-collapse" type="button">Hide</button>
      </div>
      <div id="memoryList" class="memory-list"></div>
    </div>
    <div class="operations-panel section-panel">
      <div class="ops-head">
        <h3>Operations</h3>
        <button id="opsCollapse" class="ops-collapse" type="button">Hide</button>
      </div>
      <ul id="opsList" class="ops-list"></ul>
    </div>
  </aside>
  </div>

  <script>
    const tokenEl = document.getElementById("token");
    const saveTokenBtn = document.getElementById("saveToken");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const themeSelectEl = document.getElementById("themeSelect");
    const settingsBodyEl = document.getElementById("settingsBody");
    const settingsCollapseEl = document.getElementById("settingsCollapse");
    const settingsPanelEl = document.querySelector(".settings-panel");
    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const opsListEl = document.getElementById("opsList");
    const opsCollapseEl = document.getElementById("opsCollapse");
    const operationsPanelEl = document.querySelector(".operations-panel");
    const toolsPanelEl = document.querySelector(".tools-panel");
    const toolsListEl = document.getElementById("toolsList");
    const toolsCollapseEl = document.getElementById("toolsCollapse");
    const memoryPanelEl = document.querySelector(".memory-panel");
    const memoryListEl = document.getElementById("memoryList");
    const memoryCollapseEl = document.getElementById("memoryCollapse");
    let newConversationOnNextSend = true;

    const tokenKey = "naima_api_token";
    const themeKey = "naima_theme";
    const settingsCollapsedKey = "naima_settings_collapsed";
    const toolsCollapsedKey = "naima_tools_collapsed";
    const opsCollapsedKey = "naima_ops_collapsed";
    const memoryCollapsedKey = "naima_memory_collapsed";
    tokenEl.value = localStorage.getItem(tokenKey) || "";
    const savedTheme = normalizeTheme(localStorage.getItem(themeKey) || "void");
    themeSelectEl.value = savedTheme;
    applyTheme(themeSelectEl.value);

    saveTokenBtn.addEventListener("click", () => {
      localStorage.setItem(tokenKey, tokenEl.value.trim());
      setStatus("Token saved locally.");
      loadTools();
      loadMemoryStatus();
    });
    themeSelectEl.addEventListener("change", () => {
      const value = normalizeTheme(themeSelectEl.value);
      localStorage.setItem(themeKey, value);
      applyTheme(value);
    });

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    if (tokenEl.value.trim()) {
      resetMemoryOnRefresh();
      loadTools();
      loadMemoryStatus();
    } else {
      renderTools([]);
      renderMemoryStatus(null);
    }
    applyToolsCollapsed(localStorage.getItem(toolsCollapsedKey) === "1");
    applyOpsCollapsed(localStorage.getItem(opsCollapsedKey) === "1");
    applyMemoryCollapsed(localStorage.getItem(memoryCollapsedKey) === "1");
    applySettingsCollapsed(localStorage.getItem(settingsCollapsedKey) === "1");
    toolsCollapseEl.addEventListener("click", () => {
      const next = !toolsListEl.classList.contains("is-hidden");
      applyToolsCollapsed(next);
      localStorage.setItem(toolsCollapsedKey, next ? "1" : "0");
    });
    opsCollapseEl.addEventListener("click", () => {
      const next = !opsListEl.classList.contains("is-hidden");
      applyOpsCollapsed(next);
      localStorage.setItem(opsCollapsedKey, next ? "1" : "0");
    });
    settingsCollapseEl.addEventListener("click", () => {
      const next = !settingsBodyEl.classList.contains("is-hidden");
      applySettingsCollapsed(next);
      localStorage.setItem(settingsCollapsedKey, next ? "1" : "0");
    });
    memoryCollapseEl.addEventListener("click", () => {
      const next = !memoryListEl.classList.contains("is-hidden");
      applyMemoryCollapsed(next);
      localStorage.setItem(memoryCollapsedKey, next ? "1" : "0");
    });

    function addBubble(role, text) {
      const row = document.createElement("div");
      row.className = "row " + role;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function markdownToHtml(markdown) {
      let html = escapeHtml(markdown || "");

      html = html.replace(/```([\s\S]*?)```/g, (_, code) => {
        return "<pre><code>" + code.replace(/\n$/, "") + "</code></pre>";
      });
      html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
      html = html.replace(/~~([^~\n]+)~~/g, "<del>$1</del>");
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/^&gt;\s?(.*)$/gm, "<blockquote>$1</blockquote>");
      html = html.replace(/^\s*-\s+(.*)$/gm, "<li>$1</li>");
      html = html.replace(/(<li>[\s\S]*?<\/li>)/g, "<ul>$1</ul>");
      html = html.replace(/\n/g, "<br>");

      return html;
    }

    function renderMarkdownBubble(bubble, markdown) {
      bubble.innerHTML = markdownToHtml(markdown);
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function addOp(text) {
      const li = document.createElement("li");
      const t = document.createElement("span");
      t.className = "ops-time";
      t.textContent = new Date().toLocaleTimeString();
      li.appendChild(t);
      li.appendChild(document.createTextNode(text));
      opsListEl.appendChild(li);
      opsListEl.scrollTop = opsListEl.scrollHeight;
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + tokenEl.value.trim()
      };
    }

    async function loadTools() {
      const token = tokenEl.value.trim();
      if (!token) {
        renderTools([]);
        return;
      }
      try {
        const resp = await fetch("/api/tools", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          toolsListEl.innerHTML = "";
          return;
        }
        const payload = await resp.json();
        renderTools(Array.isArray(payload.tools) ? payload.tools : []);
      } catch (_) {
        toolsListEl.innerHTML = "";
      }
    }

    async function loadMemoryStatus() {
      const token = tokenEl.value.trim();
      if (!token) {
        renderMemoryStatus(null);
        return;
      }
      try {
        const resp = await fetch("/api/memory/status", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          renderMemoryStatus(null);
          return;
        }
        const payload = await resp.json();
        renderMemoryStatus(payload.status || null);
      } catch (_) {
        renderMemoryStatus(null);
      }
    }

    async function resetMemoryOnRefresh() {
      const token = tokenEl.value.trim();
      if (!token) {
        return;
      }
      try {
        const resp = await fetch("/api/memory/reset", {
          method: "POST",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          return;
        }
        addOp("memory reset (page refresh)");
      } catch (_) {
      }
    }

    function renderTools(tools) {
      toolsListEl.innerHTML = "";
      if (!tools.length) {
        const empty = document.createElement("div");
        empty.className = "tool-item";
        empty.textContent = tokenEl.value.trim() ? "No tools available." : "Save token to load tools.";
        toolsListEl.appendChild(empty);
        return;
      }
      for (const tool of tools) {
        const row = document.createElement("label");
        row.className = "tool-item";

        const left = document.createElement("div");
        left.style.minWidth = "0";
        const name = document.createElement("span");
        name.className = "tool-name";
        name.textContent = tool.name || "unknown";
        const desc = document.createElement("span");
        desc.className = "tool-desc";
        desc.textContent = tool.description || "";
        left.appendChild(name);
        left.appendChild(desc);

        const toggle = document.createElement("input");
        toggle.className = "tool-toggle";
        toggle.type = "checkbox";
        toggle.checked = !!tool.enabled;
        toggle.addEventListener("change", async () => {
          toggle.disabled = true;
          try {
            const resp = await fetch("/api/tools", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ name: tool.name, enabled: toggle.checked })
            });
            if (!resp.ok) {
              const t = await resp.text();
              throw new Error(t || ("HTTP " + resp.status));
            }
            const payload = await resp.json();
            renderTools(Array.isArray(payload.tools) ? payload.tools : []);
            addOp("tool " + tool.name + " " + (toggle.checked ? "enabled" : "disabled"));
          } catch (err) {
            toggle.checked = !toggle.checked;
            setStatus("Tool update failed: " + (err?.message || String(err)));
          } finally {
            toggle.disabled = false;
          }
        });

        row.appendChild(left);
        row.appendChild(toggle);
        toolsListEl.appendChild(row);
      }
    }

    function renderMemoryStatus(status) {
      memoryListEl.innerHTML = "";
      if (!status) {
        const empty = document.createElement("div");
        empty.className = "memory-item";
        empty.style.gridColumn = "1 / -1";
        empty.innerHTML = '<div class="memory-key">status</div><div class="memory-val">' + (tokenEl.value.trim() ? "unavailable" : "save token to load") + "</div>";
        memoryListEl.appendChild(empty);
        return;
      }
      const entries = [
        ["max", status.MaxContextSize],
        ["current", status.CurrentSize],
        ["pinned", status.PinnedCount],
        ["unpinned", status.UnpinnedCount],
        ["summaries", status.summary_messages ?? status.SummaryMessages ?? 0],
        ["recalled", status.recall_messages ?? status.RecallMessages ?? 0],
        ["summarizer", status.HasSummarizer ? "yes" : "no"],
        ["pending_recall", status.HasPendingRecall ? "yes" : "no"]
      ];
      for (const [k, v] of entries) {
        const item = document.createElement("div");
        item.className = "memory-item";
        const key = document.createElement("div");
        key.className = "memory-key";
        key.textContent = k;
        const val = document.createElement("div");
        val.className = "memory-val";
        val.textContent = String(v);
        item.appendChild(key);
        item.appendChild(val);
        memoryListEl.appendChild(item);
      }
    }

    function applyToolsCollapsed(collapsed) {
      toolsListEl.classList.toggle("is-hidden", !!collapsed);
      toolsPanelEl.classList.toggle("collapsed", !!collapsed);
      toolsCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    function applyOpsCollapsed(collapsed) {
      opsListEl.classList.toggle("is-hidden", !!collapsed);
      operationsPanelEl.classList.toggle("collapsed", !!collapsed);
      opsCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    function applyTheme(theme) {
      const normalized = normalizeTheme(theme);
      document.body.classList.remove("theme-void", "theme-void-light", "theme-quantum", "theme-quantum-light");
      document.body.classList.add("theme-" + normalized);
    }

    function normalizeTheme(value) {
      const v = (value || "").toLowerCase();
      if (v === "quantum" || v === "void-light" || v === "quantum-light") {
        return v;
      }
      return "void";
    }

    function applyMemoryCollapsed(collapsed) {
      memoryListEl.classList.toggle("is-hidden", !!collapsed);
      memoryPanelEl.classList.toggle("collapsed", !!collapsed);
      memoryCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    function applySettingsCollapsed(collapsed) {
      settingsBodyEl.classList.toggle("is-hidden", !!collapsed);
      settingsPanelEl.classList.toggle("collapsed", !!collapsed);
      settingsCollapseEl.textContent = collapsed ? "Show" : "Hide";
    }

    async function sendMessage() {
      const token = tokenEl.value.trim();
      const message = inputEl.value.trim();
      if (!token) {
        setStatus("Set API token first.");
        return;
      }
      if (!message) {
        return;
      }

      addBubble("user", message);
      addOp("message queued");
      inputEl.value = "";
      sendBtn.disabled = true;
      setStatus("Streaming response...");

      const aiBubble = addBubble("ai", "");
      let aiRaw = "";
      const payload = {
        message,
        new_conversation: newConversationOnNextSend
      };
      newConversationOnNextSend = false;

      try {
        const resp = await fetch("/api/messages/stream", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });

        if (!resp.ok || !resp.body) {
          const text = await resp.text();
          throw new Error(text || ("HTTP " + resp.status));
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let done = false;
        const streamState = { doneEvent: false, errorEvent: false };

        while (!done) {
          const chunk = await reader.read();
          done = chunk.done;
          buffer += decoder.decode(chunk.value || new Uint8Array(), { stream: !done });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) >= 0) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            aiRaw = handleSSE(rawEvent, aiBubble, aiRaw, streamState);
          }
        }

        if (streamState.errorEvent) {
          setStatus("Request failed.");
          loadMemoryStatus();
        } else if (!streamState.doneEvent) {
          const msg = "Stream interrupted before completion.";
          if (!aiRaw) {
            aiRaw = "Error: " + msg;
            renderMarkdownBubble(aiBubble, aiRaw);
          }
          addOp("error: " + msg);
          setStatus(msg);
          loadMemoryStatus();
        } else {
          setStatus("Done.");
          loadMemoryStatus();
        }
      } catch (err) {
        setStatus("Stream error: " + (err?.message || String(err)));
      } finally {
        sendBtn.disabled = false;
      }
    }

    function handleSSE(raw, aiBubble, aiRaw, streamState) {
      const lines = raw.split("\n");
      let event = "";
      let data = "";
      for (const line of lines) {
        if (line.startsWith("event:")) {
          event = line.slice(6).trim();
        } else if (line.startsWith("data:")) {
          data += line.slice(5).trim();
        }
      }
      if (!data) return aiRaw;

      let payload;
      try {
        payload = JSON.parse(data);
      } catch (_) {
        return aiRaw;
      }

      if (event === "delta" && payload.content) {
        aiRaw += payload.content;
        renderMarkdownBubble(aiBubble, aiRaw);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } else if (event === "op" && payload.content) {
        addOp(payload.content);
      } else if (event === "done") {
        streamState.doneEvent = true;
        if (!aiRaw && payload.content) {
          aiRaw = payload.content;
          renderMarkdownBubble(aiBubble, aiRaw);
        }
        addOp("response completed");
      } else if (event === "error") {
        streamState.errorEvent = true;
        aiRaw = "Error: " + (payload.error || "unknown");
        renderMarkdownBubble(aiBubble, aiRaw);
        addOp("error: " + (payload.error || "unknown"));
      }
      return aiRaw;
    }
  </script>

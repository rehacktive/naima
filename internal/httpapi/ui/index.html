<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naima Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0F14;
      --panel: #101720;
      --text: #3DF2E0;
      --muted: #7adbd2;
      --accent: #3DF2E0;
      --accent-2: #2bc4b5;
      --bubble-user: #132a34;
      --bubble-ai: #0f1f2a;
      --border: #1f3f4b;
      --ops-bg: #0d141c;
      --ops-top-bg: #0a1219;
      --surface: #0b1118;
      --surface-2: #101a24;
      --send-fg: #0B0F14;
      --pkb-ground: #0f1a24;
      --pkb-ring: #225265;
      --pkb-topic: #2bc4b5;
      --pkb-doc: #6ecbc3;
      --pkb-topic-emissive: #14313d;
      --pkb-doc-emissive: #1a3f4b;
      --pkb-label-bg: rgba(11, 15, 20, 0.78);
      --pkb-label-border: rgba(61, 242, 224, 0.55);
      --pkb-label-text: #E8FFFC;
      --pkb-toolbar-bg: rgba(16, 23, 32, 0.8);
      --pkb-toolbar-fg: var(--text);
    }
    body.theme-quantum {
      --bg: #0E2A47;
      --panel: #102d4b;
      --text: #d4c8ff;
      --muted: #b8a6ff;
      --accent: #a88cff;
      --accent-2: #8b6dff;
      --bubble-user: #173a60;
      --bubble-ai: #122f4d;
      --border: #6e6fc9;
      --ops-bg: #102f50;
      --ops-top-bg: #0f2a45;
      --surface: #16395d;
      --surface-2: #1b4067;
      --send-fg: #0e1f34;
    }
    body.theme-void-light {
      --bg: #3DF2E0;
      --panel: #d7fffa;
      --text: #0B0F14;
      --muted: #20343f;
      --accent: #0B0F14;
      --accent-2: #1e2a36;
      --bubble-user: #baf7ef;
      --bubble-ai: #cffff7;
      --border: #2e5662;
      --ops-bg: #e9fffc;
      --ops-top-bg: #dcfffb;
      --surface: #f5fffd;
      --surface-2: #d5f7f2;
      --send-fg: #3DF2E0;
      --pkb-ground: #f0f9f7;
      --pkb-ring: #4f808b;
      --pkb-topic: #2f7d8f;
      --pkb-doc: #7a95a8;
      --pkb-topic-emissive: #d0e8ee;
      --pkb-doc-emissive: #dceaf0;
      --pkb-label-bg: rgba(236, 249, 247, 0.95);
      --pkb-label-border: rgba(47, 125, 143, 0.8);
      --pkb-label-text: #12232f;
      --pkb-toolbar-bg: rgba(236, 249, 247, 0.92);
      --pkb-toolbar-fg: #12232f;
    }
    body.theme-quantum-light {
      --bg: #d4c8ff;
      --panel: #efe8ff;
      --text: #0E2A47;
      --muted: #2c4360;
      --accent: #0E2A47;
      --accent-2: #244a73;
      --bubble-user: #e5dcff;
      --bubble-ai: #f2edff;
      --border: #4e5f8f;
      --ops-bg: #f1ebff;
      --ops-top-bg: #e8dfff;
      --surface: #faf7ff;
      --surface-2: #e8dcff;
      --send-fg: #8A6CFF;
      --pkb-ground: #f6f2ff;
      --pkb-ring: #6f6798;
      --pkb-topic: #5e6cc2;
      --pkb-doc: #8a8fc7;
      --pkb-topic-emissive: #d8d1f5;
      --pkb-doc-emissive: #e2dcfb;
      --pkb-label-bg: rgba(245, 241, 255, 0.95);
      --pkb-label-border: rgba(94, 108, 194, 0.75);
      --pkb-label-text: #1a2540;
      --pkb-toolbar-bg: rgba(245, 241, 255, 0.92);
      --pkb-toolbar-fg: #1a2540;
    }
    * {
      box-sizing: border-box;
      font-family: "Kode Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      font-size: 72.9%;
    }
    .layout {
      width: 100%;
      height: 100vh;
    }
    .app {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-left: 1px solid var(--border);
      height: 100vh;
      width: calc(100% - 380px);
      overflow: hidden;
    }
    .main-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 10px 0;
      border-bottom: 1px solid var(--border);
      background: var(--ops-bg);
      flex-shrink: 0;
    }
    .main-tab {
      border: 1px solid var(--border);
      border-bottom: 0;
      border-radius: 10px 10px 0 0;
      background: var(--surface-2);
      color: var(--muted);
      padding: 8px 12px;
      font-size: 11px;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }
    .main-tab.is-active {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(61, 242, 224, 0.22), inset 0 -2px 0 var(--accent);
    }
    .main-tab-panel {
      display: none !important;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .main-tab-panel.is-active {
      display: flex !important;
    }
    .ops {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 380px;
      border-left: 1px solid var(--border);
      background: var(--ops-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 8px;
      gap: 8px;
    }
    .section-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 8px;
      display: flex;
      flex-direction: column;
    }
    .section-panel.collapsed {
      min-height: 0;
    }
    .ops-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .ops-head h3 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .operations-panel.collapsed .ops-head {
      margin-bottom: 0;
    }
    .ops-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .ops-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
    }
    .ops-list li {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text);
      background: var(--surface);
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ops-time {
      display: inline-block;
      color: var(--muted);
      font-size: 9px;
      margin-right: 6px;
    }
    a {
      color: #58f8ea;
      text-decoration-color: #2bc4b5;
    }
    a:visited {
      color: #4fd2c8;
      text-decoration-color: #2aa39a;
    }
    a:hover {
      color: #7ffdf1;
      text-decoration-color: #7ffdf1;
    }
    a:active {
      color: #36cfc1;
    }
    .settings-panel {
      min-height: 0;
    }
    .brand-panel {
      border-bottom: 1px solid var(--border);
      background: var(--ops-top-bg);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }
    .brand-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      flex: 0 0 auto;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .brand-name {
      margin: 0;
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.03em;
      font-weight: 600;
      text-align: right;
    }
    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .settings-panel.collapsed .settings-head {
      margin-bottom: 0;
    }
    .settings-head h3 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .settings-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .settings-body {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 26vh;
      overflow-y: auto;
    }
    .theme-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .theme-row label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .theme-row select {
      width: 100%;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
    }
    .settings-body input[type="password"] {
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 11px;
      background: var(--surface);
      color: var(--text);
    }
    .settings-body button {
      height: 36px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      padding: 0 10px;
      cursor: pointer;
      font-size: 11px;
    }
    .tools-panel {
      min-height: 190px;
    }
    .tools-panel.collapsed {
      min-height: 0;
    }
    .tools-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .tools-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }
    .tools-panel.collapsed .tools-head {
      margin-bottom: 0;
    }
    .tools-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .memory-panel {
      min-height: 120px;
    }
    .memory-panel.collapsed {
      min-height: 0;
    }
    .memory-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }
    .memory-panel.collapsed .memory-head {
      margin-bottom: 0;
    }
    .memory-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0;
    }
    .memory-collapse {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
    }
    .operations-panel {
      min-height: 0;
      flex: 1;
    }
    .memory-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .memory-item {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      background: var(--ops-bg);
      min-width: 0;
    }
    .memory-key {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .memory-val {
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .tools-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
    }
    .tools-action {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 10px;
      font-size: 10px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 6px;
    }
    .is-hidden {
      display: none !important;
    }
    .tool-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 7px;
      background: var(--ops-bg);
    }
    .tool-name {
      color: var(--text);
      font-weight: 600;
      margin-right: 6px;
    }
    .tool-desc {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .tool-toggle {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-scope {
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-scope-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-scope-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0;
    }
    .chat-scope-summary {
      font-size: 11px;
      color: var(--text);
      margin: 0;
      overflow-wrap: anywhere;
    }
    .chat-scope-docs {
      font-size: 10px;
      color: var(--muted);
      margin: 0;
      overflow-wrap: anywhere;
    }
    .chat-scope-clear {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 7px 10px;
      cursor: pointer;
      font-size: 10px;
      flex-shrink: 0;
    }
    .row {
      display: flex;
      width: 100%;
    }
    .row.user { justify-content: flex-end; }
    .row.ai { justify-content: flex-start; }
    .bubble {
      max-width: min(86%, 760px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 13px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.25);
    }
    .user .bubble {
      background: var(--bubble-user);
      border-color: var(--border);
    }
    .ai .bubble {
      background: var(--bubble-ai);
    }
    .bubble.markdown {
      white-space: normal;
    }
    .bubble.markdown h1,
    .bubble.markdown h2,
    .bubble.markdown h3,
    .bubble.markdown h4,
    .bubble.markdown h5,
    .bubble.markdown h6 {
      margin: 0 0 0.55em;
      color: var(--text);
      line-height: 1.25;
    }
    .bubble.markdown h1 { font-size: 1.14em; }
    .bubble.markdown h2 { font-size: 1.08em; }
    .bubble.markdown h3 { font-size: 1.03em; }
    .bubble.markdown p {
      margin: 0 0 0.72em;
    }
    .bubble.markdown p:last-child,
    .bubble.markdown ul:last-child,
    .bubble.markdown ol:last-child,
    .bubble.markdown pre:last-child,
    .bubble.markdown blockquote:last-child {
      margin-bottom: 0;
    }
    .bubble.markdown ul,
    .bubble.markdown ol {
      margin: 0 0 0.8em 1.25em;
      padding: 0;
    }
    .bubble.markdown li {
      margin: 0 0 0.25em;
      line-height: 1.45;
    }
    .bubble.markdown li:last-child {
      margin-bottom: 0;
    }
    .bubble.markdown code {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 0.05em 0.32em;
      font-size: 0.95em;
    }
    .bubble.markdown pre {
      margin: 0 0 0.8em;
      padding: 0.8em;
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.18);
    }
    .bubble.markdown pre code {
      border: 0;
      background: transparent;
      padding: 0;
    }
    .bubble.markdown blockquote {
      margin: 0 0 0.8em;
      padding-left: 0.85em;
      border-left: 2px solid var(--accent-2);
      color: var(--muted);
    }
    .bubble.markdown strong {
      color: var(--text);
    }
    .composer {
      border-top: 1px solid var(--border);
      background: var(--ops-bg);
      padding: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: end;
      flex-shrink: 0;
    }
    .composer-action {
      height: 44px;
      min-width: 82px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
    }
    .send {
      height: 44px;
      min-width: 90px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: var(--send-fg);
      font-weight: 600;
      cursor: pointer;
    }
    .send:disabled {
      background: #9abbe0;
      cursor: not-allowed;
    }
    .send.send-stop {
      background: #b54c4c;
      color: #fff3f3;
    }
    .status {
      font-size: 10px;
      color: var(--muted);
      padding: 0 12px 8px;
      min-height: 18px;
      flex-shrink: 0;
    }
    .pkb-overlay {
      display: none;
      flex: 1;
      min-height: 0;
      padding: 12px;
      background: transparent;
    }
    .pkb-overlay.is-active {
      display: flex !important;
    }
    .pkb-shell {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--panel), var(--surface));
      display: grid;
      grid-template-columns: minmax(320px, 60%) minmax(320px, 40%);
      overflow: hidden;
      transition: grid-template-columns 420ms ease;
    }
    .pkb-shell.has-selection {
      grid-template-columns: minmax(320px, 40%) minmax(320px, 60%);
    }
    .pkb-stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        radial-gradient(circle at top, rgba(61, 242, 224, 0.12), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.1));
    }
    .pkb-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    .pkb-canvas.dragging {
      cursor: grabbing;
    }
    .pkb-toolbar {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }
    .pkb-badge,
    .pkb-toolbar button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--pkb-toolbar-bg);
      color: var(--pkb-toolbar-fg);
      padding: 6px 10px;
      font-size: 10px;
    }
    .pkb-toolbar button {
      cursor: pointer;
    }
    .pkb-toolbar-group {
      display: flex;
      gap: 8px;
    }
    .pkb-panel {
      border-left: 1px solid var(--border);
      background: var(--ops-bg);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pkb-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .pkb-panel-head h3 {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .pkb-close {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      font-size: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .pkb-panel-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      min-height: 0;
    }
    .pkb-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .pkb-stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 8px;
    }
    .pkb-stat-key {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pkb-stat-val {
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .pkb-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .pkb-card.is-clickable {
      cursor: pointer;
    }
    .pkb-card.is-clickable:hover {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    .pkb-card.is-selecting {
      cursor: pointer;
    }
    .pkb-card.is-selected {
      border-color: var(--accent);
      background: var(--bubble-ai);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .pkb-card h4 {
      margin: 0;
      font-size: 11px;
      color: var(--text);
    }
    .pkb-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .pkb-action {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 7px 10px;
      font-size: 10px;
      cursor: pointer;
    }
    .pkb-action.danger {
      border-color: #8a3030;
      color: #ff9f9f;
      background: rgba(138, 48, 48, 0.12);
    }
    .pkb-action.primary {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(61, 242, 224, 0.12);
    }
    .pkb-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pkb-card p,
    .pkb-card div {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .pkb-topic-summary {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      padding: 8px 10px;
      margin-bottom: 10px;
    }
    .pkb-topic-summary h4 {
      margin: 0 0 6px;
    }
    .pkb-topic-summary p,
    .pkb-topic-summary div {
      margin: 0;
    }
    .pkb-topic-summary .pkb-topic-value {
      color: var(--text);
    }
    .pkb-topic-summary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pkb-topic-summary-title {
      min-width: 0;
      flex: 1;
    }
    .pkb-topic-summary-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pkb-topic-summary-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }
    .pkb-content {
      white-space: normal;
      line-height: 1.65;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      max-height: 38vh;
      overflow-y: auto;
    }
    .pkb-content h1,
    .pkb-content h2,
    .pkb-content h3,
    .pkb-content h4,
    .pkb-content h5,
    .pkb-content h6 {
      color: var(--text);
      margin: 0 0 10px;
      line-height: 1.25;
    }
    .pkb-content h1 { font-size: 16px; }
    .pkb-content h2 { font-size: 14px; }
    .pkb-content h3 { font-size: 13px; }
    .pkb-content p {
      margin: 0 0 8px;
    }
    .pkb-content ul,
    .pkb-content ol {
      margin: 0 0 12px 18px;
      padding: 0;
    }
    .pkb-content li {
      margin-bottom: 6px;
    }
    .pkb-content code {
      background: rgba(255, 255, 255, 0.06);
      padding: 1px 4px;
      border-radius: 4px;
    }
    .pkb-content pre {
      margin: 0 0 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.2);
    }
    .pkb-content blockquote {
      margin: 0 0 12px;
      padding-left: 10px;
      border-left: 2px solid var(--border);
      color: var(--muted);
    }
    .pkb-doc-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pkb-empty {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.4;
    }
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 12, 0.74);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 20px;
    }
    .dialog {
      width: min(520px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dialog.is-busy {
      opacity: 0.88;
    }
    .dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .dialog-head h3 {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dialog-close {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      font-size: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .dialog-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .dialog-field label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dialog-field select,
    .dialog-field input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
    }
    .dialog-field input[type="file"] {
      height: auto;
      padding: 10px;
    }
    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .dialog-actions button {
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      font-size: 11px;
    }
    .dialog-status {
      min-height: 18px;
      font-size: 10px;
      color: var(--muted);
    }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { width: 100%; min-height: auto; }
      .ops {
        position: static;
        width: 100%;
        min-height: 280px;
      }
      .layout {
        height: auto;
      }
      .main-tab-panel {
        min-height: 420px;
      }
      .pkb-overlay {
        padding: 10px;
      }
      .pkb-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(280px, 44vh) minmax(0, 1fr);
      }
      .pkb-panel {
        border-left: 0;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="layout">
  <div class="app">
    <div class="main-tabs">
      <button id="chatTabBtn" class="main-tab is-active" type="button">Chat</button>
      <button id="pkbTabBtn" class="main-tab" type="button">Personal knowledge base</button>
    </div>
    <div id="chatTabPanel" class="main-tab-panel is-active">
      <div id="chatScope" class="chat-scope is-hidden">
        <div class="chat-scope-main">
          <p class="chat-scope-title">Document chat scope</p>
          <p id="chatScopeSummary" class="chat-scope-summary"></p>
          <p id="chatScopeDocs" class="chat-scope-docs"></p>
        </div>
        <button id="chatScopeClear" class="chat-scope-clear" type="button">Clear</button>
      </div>
      <div id="messages" class="messages"></div>
      <div class="composer">
        <button id="ingestBtn" class="composer-action" type="button">Ingest</button>
        <textarea id="input" placeholder="Type a message..."></textarea>
        <button id="send" class="send">Send</button>
      </div>
      <div id="status" class="status"></div>
    </div>
    <div id="pkbOverlay" class="pkb-overlay main-tab-panel">
      <div class="pkb-shell">
        <div class="pkb-stage">
          <div class="pkb-toolbar">
            <span id="pkbSummary" class="pkb-badge">Personal knowledge base</span>
            <div class="pkb-toolbar-group">
              <button id="pkbZoomIn" type="button">Zoom in</button>
              <button id="pkbZoomOut" type="button">Zoom out</button>
              <button id="pkbRefresh" type="button">Refresh</button>
            </div>
          </div>
          <div id="pkbCanvas" class="pkb-canvas"></div>
        </div>
        <div class="pkb-panel">
          <div class="pkb-panel-head">
            <h3>Topics Space</h3>
            <button id="pkbClose" class="pkb-close" type="button">Close</button>
          </div>
          <div class="pkb-panel-body">
            <div id="pkbStats" class="pkb-stat-grid"></div>
            <div id="pkbDetail" class="pkb-card">
              <h4>Selection</h4>
              <p>Pick a building or document node to inspect it.</p>
            </div>
            <div id="pkbDocuments" class="pkb-doc-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <aside class="ops">
    <div class="brand-panel">
      <p class="brand-name">N.A.I.M.A.<br/>next AI modular agent</p>
      <img class="brand-logo" src="/ui/logo2.png" alt="Naima logo">
    </div>
    <div class="settings-panel section-panel">
      <div class="settings-head">
        <h3>Settings</h3>
        <button id="settingsCollapse" class="settings-collapse" type="button">Hide</button>
      </div>
      <div id="settingsBody" class="settings-body">
        <div class="theme-row">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="void">Void</option>
            <option value="void-light">Void Light</option>
            <option value="quantum">Quantum</option>
            <option value="quantum-light">Quantum Light</option>
          </select>
        </div>
        <input id="token" type="password" placeholder="API token (Bearer)" autocomplete="off">
        <button id="saveToken">Save token</button>
      </div>
    </div>
    <div class="tools-panel section-panel">
      <div class="tools-head">
        <p class="tools-title">Tools</p>
        <button id="toolsToggleAll" class="tools-collapse" type="button">Enable All</button>
        <button id="toolsCollapse" class="tools-collapse" type="button">Hide</button>
      </div>
      <div id="toolsList" class="tools-list"></div>
    </div>
    <div class="memory-panel section-panel">
      <div class="memory-head">
        <p class="memory-title">Memory</p>
        <button id="memoryCollapse" class="memory-collapse" type="button">Hide</button>
      </div>
      <div id="memoryList" class="memory-list"></div>
    </div>
    <div class="operations-panel section-panel">
      <div class="ops-head">
        <h3>Operations</h3>
        <button id="opsCollapse" class="ops-collapse" type="button">Hide</button>
      </div>
      <ul id="opsList" class="ops-list"></ul>
    </div>
  </aside>
  </div>
  <div id="ingestDialog" class="dialog-backdrop is-hidden">
    <div class="dialog">
      <div class="dialog-head">
        <h3>Ingest URL</h3>
        <button id="ingestClose" class="dialog-close" type="button">Close</button>
      </div>
      <div class="dialog-field">
        <label for="ingestTopicSelect">Topic</label>
        <select id="ingestTopicSelect">
          <option value="">Select topic...</option>
          <option value="__new__">Create new topic</option>
        </select>
      </div>
      <div id="ingestNewTopicWrap" class="dialog-field is-hidden">
        <label for="ingestNewTopic">New topic</label>
        <input id="ingestNewTopic" type="text" placeholder="Topic title">
      </div>
      <div class="dialog-field">
        <label for="ingestMode">Source type</label>
        <select id="ingestMode">
          <option value="url">URL</option>
          <option value="file">Document</option>
        </select>
      </div>
      <div id="ingestURLWrap" class="dialog-field">
        <label for="ingestURL">URL</label>
        <input id="ingestURL" type="url" placeholder="https://example.com/article">
      </div>
      <div id="ingestFileWrap" class="dialog-field is-hidden">
        <label for="ingestFile">Document</label>
        <input id="ingestFile" type="file" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.md,.html,.htm">
      </div>
      <div class="dialog-actions">
        <button id="ingestSubmit" type="button">Save</button>
      </div>
      <div id="ingestStatus" class="dialog-status"></div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script>
    const ingestBtnEl = document.getElementById("ingestBtn");
    const chatTabBtnEl = document.getElementById("chatTabBtn");
    const pkbTabBtnEl = document.getElementById("pkbTabBtn");
    const chatTabPanelEl = document.getElementById("chatTabPanel");
    const tokenEl = document.getElementById("token");
    const saveTokenBtn = document.getElementById("saveToken");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const themeSelectEl = document.getElementById("themeSelect");
    const settingsBodyEl = document.getElementById("settingsBody");
    const settingsCollapseEl = document.getElementById("settingsCollapse");
    const settingsPanelEl = document.querySelector(".settings-panel");
    const pkbShellEl = document.querySelector(".pkb-shell");
    const messagesEl = document.getElementById("messages");
    const chatScopeEl = document.getElementById("chatScope");
    const chatScopeSummaryEl = document.getElementById("chatScopeSummary");
    const chatScopeDocsEl = document.getElementById("chatScopeDocs");
    const chatScopeClearEl = document.getElementById("chatScopeClear");
    const statusEl = document.getElementById("status");
    const opsListEl = document.getElementById("opsList");
    const opsCollapseEl = document.getElementById("opsCollapse");
    const operationsPanelEl = document.querySelector(".operations-panel");
    const toolsPanelEl = document.querySelector(".tools-panel");
    const toolsListEl = document.getElementById("toolsList");
    const toolsCollapseEl = document.getElementById("toolsCollapse");
    const toolsToggleAllEl = document.getElementById("toolsToggleAll");
    const memoryPanelEl = document.querySelector(".memory-panel");
    const memoryListEl = document.getElementById("memoryList");
    const memoryCollapseEl = document.getElementById("memoryCollapse");
    const pkbOverlayEl = document.getElementById("pkbOverlay");
    const pkbCanvasEl = document.getElementById("pkbCanvas");
    const pkbCloseEl = document.getElementById("pkbClose");
    const pkbRefreshEl = document.getElementById("pkbRefresh");
    const pkbZoomInEl = document.getElementById("pkbZoomIn");
    const pkbZoomOutEl = document.getElementById("pkbZoomOut");
    const pkbSummaryEl = document.getElementById("pkbSummary");
    const pkbStatsEl = document.getElementById("pkbStats");
    const pkbDetailEl = document.getElementById("pkbDetail");
    const pkbDocumentsEl = document.getElementById("pkbDocuments");
    const ingestDialogEl = document.getElementById("ingestDialog");
    const ingestDialogBoxEl = ingestDialogEl.querySelector(".dialog");
    const ingestCloseEl = document.getElementById("ingestClose");
    const ingestModeEl = document.getElementById("ingestMode");
    const ingestTopicSelectEl = document.getElementById("ingestTopicSelect");
    const ingestNewTopicWrapEl = document.getElementById("ingestNewTopicWrap");
    const ingestNewTopicEl = document.getElementById("ingestNewTopic");
    const ingestURLWrapEl = document.getElementById("ingestURLWrap");
    const ingestURLEl = document.getElementById("ingestURL");
    const ingestFileWrapEl = document.getElementById("ingestFileWrap");
    const ingestFileEl = document.getElementById("ingestFile");
    const ingestSubmitEl = document.getElementById("ingestSubmit");
    const ingestStatusEl = document.getElementById("ingestStatus");
    let newConversationOnNextSend = true;
    let currentMessageController = null;
    let isSendingMessage = false;
    let currentTools = [];
    let pkbChatSelection = null;
    let chatScopeState = null;
    const pkbSceneState = {
      renderer: null,
      scene: null,
      camera: null,
      raycaster: null,
      pointer: null,
      resizeObserver: null,
      animationFrame: 0,
      resizeAnimationFrame: 0,
      drag: { active: false, x: 0, y: 0 },
      orbit: { yaw: 0.75, pitch: 0.55, radius: 28 },
      target: { currentX: 0, currentY: 2, currentZ: 0, goalX: 0, goalY: 2, goalZ: 0 },
      meshes: [],
      selected: null,
      currentTopics: []
    };

    const tokenKey = "naima_api_token";
    const themeKey = "naima_theme";
    const settingsCollapsedKey = "naima_settings_collapsed";
    const toolsCollapsedKey = "naima_tools_collapsed";
    const opsCollapsedKey = "naima_ops_collapsed";
    const memoryCollapsedKey = "naima_memory_collapsed";
    const mainTabKey = "naima_main_tab";
    tokenEl.value = localStorage.getItem(tokenKey) || "";
    const savedTheme = normalizeTheme(localStorage.getItem(themeKey) || "void");
    themeSelectEl.value = savedTheme;
    applyTheme(themeSelectEl.value);

    saveTokenBtn.addEventListener("click", () => {
      localStorage.setItem(tokenKey, tokenEl.value.trim());
      setStatus("Token saved locally.");
      loadTools();
      loadMemoryStatus();
    });
    themeSelectEl.addEventListener("change", () => {
      const value = normalizeTheme(themeSelectEl.value);
      localStorage.setItem(themeKey, value);
      applyTheme(value);
      if (currentMainTab() === "pkb" && Array.isArray(pkbSceneState.currentTopics)) {
        buildPKBScene(pkbSceneState.currentTopics);
      }
    });

    sendBtn.addEventListener("click", () => {
      if (isSendingMessage) {
        stopCurrentMessage();
        return;
      }
      sendMessage();
    });
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!isSendingMessage) {
          sendMessage();
        }
      }
    });
    if (tokenEl.value.trim()) {
      resetMemoryOnRefresh();
      loadTools();
      loadMemoryStatus();
    } else {
      renderTools([]);
      renderMemoryStatus(null);
    }
    applyToolsCollapsed(localStorage.getItem(toolsCollapsedKey) === "1");
    applyOpsCollapsed(localStorage.getItem(opsCollapsedKey) === "1");
    applyMemoryCollapsed(localStorage.getItem(memoryCollapsedKey) === "1");
    applySettingsCollapsed(localStorage.getItem(settingsCollapsedKey) === "1");
    ingestBtnEl.addEventListener("click", openIngestDialog);
    ingestCloseEl.addEventListener("click", closeIngestDialog);
    ingestDialogEl.addEventListener("click", (event) => {
      if (event.target === ingestDialogEl) {
        closeIngestDialog();
      }
    });
    ingestTopicSelectEl.addEventListener("change", () => {
      const creating = ingestTopicSelectEl.value === "__new__";
      ingestNewTopicWrapEl.classList.toggle("is-hidden", !creating);
    });
    ingestModeEl.addEventListener("change", () => {
      const isFile = ingestModeEl.value === "file";
      ingestURLWrapEl.classList.toggle("is-hidden", isFile);
      ingestFileWrapEl.classList.toggle("is-hidden", !isFile);
    });
    ingestSubmitEl.addEventListener("click", submitIngest);
    chatScopeClearEl.addEventListener("click", clearChatScope);
    chatTabBtnEl.addEventListener("click", () => setMainTab("chat"));
    pkbTabBtnEl.addEventListener("click", () => openPKBView(true));
    toolsCollapseEl.addEventListener("click", () => {
      const next = !toolsListEl.classList.contains("is-hidden");
      applyToolsCollapsed(next);
      localStorage.setItem(toolsCollapsedKey, next ? "1" : "0");
    });
    toolsToggleAllEl.addEventListener("click", async () => {
      const targetEnabled = toolsToggleAllEl.textContent === "Enable All";
      toolsToggleAllEl.disabled = true;
      try {
        for (const tool of currentTools) {
          if (tool.enabled !== targetEnabled) {
            await fetch("/api/tools", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ name: tool.name, enabled: targetEnabled })
            });
          }
        }
        await loadTools();
        addOp(targetEnabled ? "all tools enabled" : "all tools disabled");
      } catch (err) {
        setStatus("Tool update failed: " + (err?.message || String(err)));
      } finally {
        toolsToggleAllEl.disabled = false;
      }
    });
    opsCollapseEl.addEventListener("click", () => {
      const next = !opsListEl.classList.contains("is-hidden");
      applyOpsCollapsed(next);
      localStorage.setItem(opsCollapsedKey, next ? "1" : "0");
    });
    settingsCollapseEl.addEventListener("click", () => {
      const next = !settingsBodyEl.classList.contains("is-hidden");
      applySettingsCollapsed(next);
      localStorage.setItem(settingsCollapsedKey, next ? "1" : "0");
    });
    memoryCollapseEl.addEventListener("click", () => {
      const next = !memoryListEl.classList.contains("is-hidden");
      applyMemoryCollapsed(next);
      localStorage.setItem(memoryCollapsedKey, next ? "1" : "0");
    });
    pkbCloseEl.addEventListener("click", closePKBView);
    pkbRefreshEl.addEventListener("click", () => openPKBView(true));
    pkbZoomInEl.addEventListener("click", () => {
      pkbSceneState.orbit.radius = Math.max(10, pkbSceneState.orbit.radius - 2.5);
    });
    pkbZoomOutEl.addEventListener("click", () => {
      pkbSceneState.orbit.radius = Math.min(54, pkbSceneState.orbit.radius + 2.5);
    });
    window.addEventListener("resize", () => {
      if (currentMainTab() === "pkb") {
        resizePKBRenderer();
      }
    });
    pkbShellEl.addEventListener("transitionrun", () => {
      if (currentMainTab() === "pkb") {
        startPKBResizeLoop();
      }
    });
    pkbShellEl.addEventListener("transitionend", () => {
      if (currentMainTab() === "pkb") {
        resizePKBRenderer();
      }
      stopPKBResizeLoop();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && currentMainTab() === "pkb") {
        closePKBView();
      }
    });
    if (localStorage.getItem(mainTabKey) === "pkb" && tokenEl.value.trim()) {
      openPKBView(true);
    } else {
      setMainTab("chat");
    }

    function addBubble(role, text) {
      const row = document.createElement("div");
      row.className = "row " + role;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    // Returns the URL only when its scheme is http or https; otherwise returns "".
    // Prevents javascript: and data: URIs from being used as href values.
    function safeHref(url) {
      try {
        const u = new URL(String(url || ""));
        if (u.protocol !== "http:" && u.protocol !== "https:") {
          return "";
        }
        return u.href;
      } catch (_) {
        return "";
      }
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text || "");
      html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
      html = html.replace(/~~([^~\n]+)~~/g, "<del>$1</del>");
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      return html;
    }

    function markdownToHtml(markdown) {
      const source = String(markdown || "")
        .replace(/\r\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n");
      const codeBlocks = [];
      const normalized = source.replace(/```([\s\S]*?)```/g, (_, code) => {
        const token = `@@CODEBLOCK_${codeBlocks.length}@@`;
        codeBlocks.push("<pre><code>" + escapeHtml(code).replace(/\n$/, "") + "</code></pre>");
        return token;
      });

      const blocks = normalized.split(/\n\s*\n/);
      const htmlBlocks = [];
      for (const block of blocks) {
        const trimmed = block.trim();
        if (!trimmed) {
          continue;
        }
        if (/^@@CODEBLOCK_\d+@@$/.test(trimmed)) {
          htmlBlocks.push(trimmed);
          continue;
        }

        const lines = trimmed.split("\n").map((line) => line.trimEnd());
        if (lines.every((line) => /^\s*[-*]\s+/.test(line))) {
          htmlBlocks.push("<ul>" + lines.map((line) => "<li>" + renderInlineMarkdown(line.replace(/^\s*[-*]\s+/, "")) + "</li>").join("") + "</ul>");
          continue;
        }
        if (lines.every((line) => /^\s*\d+\.\s+/.test(line))) {
          htmlBlocks.push("<ol>" + lines.map((line) => "<li>" + renderInlineMarkdown(line.replace(/^\s*\d+\.\s+/, "")) + "</li>").join("") + "</ol>");
          continue;
        }
        if (lines.every((line) => /^>\s?/.test(line))) {
          htmlBlocks.push("<blockquote>" + lines.map((line) => renderInlineMarkdown(line.replace(/^>\s?/, ""))).join("<br>") + "</blockquote>");
          continue;
        }
        if (lines.length === 1) {
          const line = lines[0].trim();
          const heading = line.match(/^(#{1,6})\s+(.*)$/);
          if (heading) {
            htmlBlocks.push("<h" + heading[1].length + ">" + renderInlineMarkdown(heading[2]) + "</h" + heading[1].length + ">");
            continue;
          }
        }
        htmlBlocks.push("<p>" + lines.map((line) => renderInlineMarkdown(line.trim())).join("<br>") + "</p>");
      }

      return htmlBlocks.join("").replace(/@@CODEBLOCK_(\d+)@@/g, (_, index) => codeBlocks[Number(index)] || "");
    }

    function renderMarkdownBubble(bubble, markdown) {
      bubble.classList.add("markdown");
      bubble.innerHTML = markdownToHtml(markdown);
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function currentMainTab() {
      return pkbOverlayEl.classList.contains("is-active") ? "pkb" : "chat";
    }

    function setMainTab(tab) {
      const next = tab === "pkb" ? "pkb" : "chat";
      chatTabBtnEl.classList.toggle("is-active", next === "chat");
      pkbTabBtnEl.classList.toggle("is-active", next === "pkb");
      chatTabPanelEl.classList.toggle("is-active", next === "chat");
      pkbOverlayEl.classList.toggle("is-active", next === "pkb");
      localStorage.setItem(mainTabKey, next);
      if (next === "pkb") {
        requestAnimationFrame(resizePKBRenderer);
      }
    }

    function resetPKBChatSelection() {
      pkbChatSelection = null;
    }

    function renderChatScope() {
      if (!chatScopeState || !Array.isArray(chatScopeState.documents) || !chatScopeState.documents.length) {
        chatScopeEl.classList.add("is-hidden");
        chatScopeSummaryEl.textContent = "";
        chatScopeDocsEl.textContent = "";
        return;
      }
      chatScopeEl.classList.remove("is-hidden");
      chatScopeSummaryEl.textContent = 'Topic: ' + (chatScopeState.topicTitle || 'Unknown') + ' | ' + chatScopeState.documents.length + ' document(s) selected';
      chatScopeDocsEl.textContent = chatScopeState.documents.map((doc) => doc.title || ('Document ' + doc.id)).join(' | ');
    }

    async function clearChatScope() {
      chatScopeState = null;
      renderChatScope();
      newConversationOnNextSend = true;
      await resetAgentMemory("memory reset (chat scope cleared)");
      addOp("document chat scope cleared");
      setStatus("Document chat scope cleared.");
    }

    function buildScopedMessage(message) {
      if (!chatScopeState || !Array.isArray(chatScopeState.documents) || !chatScopeState.documents.length) {
        return message;
      }
      const docs = chatScopeState.documents.map((doc, index) => {
        const title = doc.title || ('Document ' + doc.id);
        const content = trimText(String(doc.content || '').trim(), 6000);
        return [
          'Document ' + (index + 1) + ': ' + title,
          'Kind: ' + (doc.kind || 'note'),
          doc.source_url ? ('Source: ' + doc.source_url) : '',
          'Content:',
          content
        ].filter(Boolean).join('\n');
      }).join('\n\n---\n\n');

      return [
        'Answer the user using only the following selected personal knowledge base documents.',
        'If the answer is not supported by these documents, say that the selected documents do not contain enough information.',
        'Do not use external knowledge, web knowledge, or unrelated memory.',
        '',
        'Selected topic: ' + (chatScopeState.topicTitle || 'Unknown'),
        '',
        docs,
        '',
        'User request: ' + message
      ].join('\n');
    }

    function addOp(text) {
      const li = document.createElement("li");
      const t = document.createElement("span");
      t.className = "ops-time";
      t.textContent = new Date().toLocaleTimeString();
      li.appendChild(t);
      li.appendChild(document.createTextNode(text));
      opsListEl.appendChild(li);
      opsListEl.scrollTop = opsListEl.scrollHeight;
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + tokenEl.value.trim()
      };
    }

    async function fetchPKBGraph() {
      const resp = await fetch("/api/pkb/graph", {
        method: "GET",
        headers: { "Authorization": "Bearer " + tokenEl.value.trim() }
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(text || ("HTTP " + resp.status));
      }
      return resp.json();
    }

    async function ingestURL(payload) {
      const resp = await fetch("/api/pkb/ingest", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(text || ("HTTP " + resp.status));
      }
      return resp.json();
    }

    async function ingestFile(payload) {
      const resp = await fetch("/api/pkb/ingest/file", {
        method: "POST",
        headers: { "Authorization": "Bearer " + tokenEl.value.trim() },
        body: payload
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(text || ("HTTP " + resp.status));
      }
      return resp.json();
    }

    async function loadTools() {
      const token = tokenEl.value.trim();
      if (!token) {
        renderTools([]);
        return;
      }
      try {
        const resp = await fetch("/api/tools", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          toolsListEl.innerHTML = "";
          return;
        }
        const payload = await resp.json();
        renderTools(Array.isArray(payload.tools) ? payload.tools : []);
      } catch (_) {
        toolsListEl.innerHTML = "";
      }
    }

    async function loadMemoryStatus() {
      const token = tokenEl.value.trim();
      if (!token) {
        renderMemoryStatus(null);
        return;
      }
      try {
        const resp = await fetch("/api/memory/status", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          renderMemoryStatus(null);
          return;
        }
        const payload = await resp.json();
        renderMemoryStatus(payload.status || null);
      } catch (_) {
        renderMemoryStatus(null);
      }
    }

    async function resetMemoryOnRefresh() {
      await resetAgentMemory("memory reset (page refresh)");
    }

    async function resetAgentMemory(opText) {
      const token = tokenEl.value.trim();
      if (!token) {
        return;
      }
      try {
        const resp = await fetch("/api/memory/reset", {
          method: "POST",
          headers: { "Authorization": "Bearer " + token }
        });
        if (!resp.ok) {
          return;
        }
        if (opText) {
          addOp(opText);
        }
        loadMemoryStatus();
      } catch (_) {
      }
    }

    function renderTools(tools) {
      currentTools = tools;
      toolsListEl.innerHTML = "";
      if (!tools.length) {
        toolsToggleAllEl.style.display = "none";
        const empty = document.createElement("div");
        empty.className = "tool-item";
        empty.textContent = tokenEl.value.trim() ? "No tools available." : "Save token to load tools.";
        toolsListEl.appendChild(empty);
        return;
      }
      toolsToggleAllEl.style.display = "";
      const allEnabled = tools.every(t => t.enabled);
      toolsToggleAllEl.textContent = allEnabled ? "Disable All" : "Enable All";
      for (const tool of tools) {
        const row = document.createElement("label");
        row.className = "tool-item";

        const left = document.createElement("div");
        left.style.minWidth = "0";
        const name = document.createElement("span");
        name.className = "tool-name";
        name.textContent = tool.name || "unknown";
        const desc = document.createElement("span");
        desc.className = "tool-desc";
        desc.textContent = tool.description || "";
        left.appendChild(name);
        left.appendChild(desc);

        const toggle = document.createElement("input");
        toggle.className = "tool-toggle";
        toggle.type = "checkbox";
        toggle.checked = !!tool.enabled;
        toggle.addEventListener("change", async () => {
          toggle.disabled = true;
          try {
            const resp = await fetch("/api/tools", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ name: tool.name, enabled: toggle.checked })
            });
            if (!resp.ok) {
              const t = await resp.text();
              throw new Error(t || ("HTTP " + resp.status));
            }
            const payload = await resp.json();
            renderTools(Array.isArray(payload.tools) ? payload.tools : []);
            addOp("tool " + tool.name + " " + (toggle.checked ? "enabled" : "disabled"));
          } catch (err) {
            toggle.checked = !toggle.checked;
            setStatus("Tool update failed: " + (err?.message || String(err)));
          } finally {
            toggle.disabled = false;
          }
        });

        row.appendChild(left);
        row.appendChild(toggle);
        toolsListEl.appendChild(row);
      }
    }

    function renderMemoryStatus(status) {
      memoryListEl.innerHTML = "";
      if (!status) {
        const empty = document.createElement("div");
        empty.className = "memory-item";
        empty.style.gridColumn = "1 / -1";
        empty.innerHTML = '<div class="memory-key">status</div><div class="memory-val">' + (tokenEl.value.trim() ? "unavailable" : "save token to load") + "</div>";
        memoryListEl.appendChild(empty);
        return;
      }
      const entries = [
        ["max", status.MaxContextSize],
        ["current", status.CurrentSize],
        ["pinned", status.PinnedCount],
        ["unpinned", status.UnpinnedCount],
        ["summaries", status.summary_messages ?? status.SummaryMessages ?? 0],
        ["recalled", status.recall_messages ?? status.RecallMessages ?? 0],
        ["summarizer", status.HasSummarizer ? "yes" : "no"],
        ["pending_recall", status.HasPendingRecall ? "yes" : "no"]
      ];
      for (const [k, v] of entries) {
        const item = document.createElement("div");
        item.className = "memory-item";
        const key = document.createElement("div");
        key.className = "memory-key";
        key.textContent = k;
        const val = document.createElement("div");
        val.className = "memory-val";
        val.textContent = String(v);
        item.appendChild(key);
        item.appendChild(val);
        memoryListEl.appendChild(item);
      }
    }

    function renderPKBStats(topics) {
      const topicCount = topics.length;
      const docCount = topics.reduce((sum, topic) => sum + ((topic.documents_list || []).length), 0);
      const biggest = topics.reduce((max, topic) => Math.max(max, (topic.documents_list || []).length), 0);
      const stats = [
        ["topics", topicCount],
        ["documents", docCount],
        ["largest topic", biggest],
        ["selection", pkbSceneState.selected ? pkbSceneState.selected.kind : "none"]
      ];
      pkbStatsEl.innerHTML = "";
      for (const [key, value] of stats) {
        const card = document.createElement("div");
        card.className = "pkb-stat";
        card.innerHTML = '<div class="pkb-stat-key">' + escapeHtml(String(key)) + '</div><div class="pkb-stat-val">' + escapeHtml(String(value)) + "</div>";
        pkbStatsEl.appendChild(card);
      }
    }

    function renderPKBSelection(meta) {
      pkbSceneState.selected = meta || null;
      pkbShellEl.classList.toggle("has-selection", !!meta);
      if (meta && meta.focus) {
        setPKBTarget(meta.focus.x, meta.focus.y, meta.focus.z);
      } else {
        setPKBTarget(0, 2, 0);
      }
      requestAnimationFrame(resizePKBRenderer);
      if (!meta) {
        resetPKBChatSelection();
        pkbDetailEl.innerHTML = "<h4>Selection</h4><p>Pick a building or document node to inspect it.</p>";
        pkbDocumentsEl.innerHTML = "";
        return;
      }

      if (meta.kind === "topic") {
        const isSelectingForChat = !!pkbChatSelection && Number(pkbChatSelection.topicID) === Number(meta.topic.id);
        if (!isSelectingForChat) {
          resetPKBChatSelection();
        }
        const firstLink = (meta.topic.documents_list || []).find((doc) => doc.source_url);
        const selectedCount = isSelectingForChat ? pkbChatSelection.selectedDocIDs.size : 0;
        pkbDetailEl.innerHTML =
          "<h4>" + escapeHtml(meta.topic.title) + "</h4>" +
          (isSelectingForChat
            ? '<div class="pkb-actions"><button class="pkb-action primary" type="button" data-pkb-chat-selected="' + escapeHtml(String(meta.topic.id)) + '"' + (selectedCount ? '' : ' disabled') + '>Chat with selected document(s)</button><button class="pkb-action" type="button" data-pkb-cancel-select-chat="' + escapeHtml(String(meta.topic.id)) + '">Cancel selection</button><button class="pkb-action danger" type="button" data-pkb-delete-topic="' + escapeHtml(String(meta.topic.id)) + '">Delete topic</button></div><p>' + escapeHtml(String(selectedCount)) + ' document(s) selected for chat.</p>'
            : '<div class="pkb-actions"><button class="pkb-action primary" type="button" data-pkb-select-chat="' + escapeHtml(String(meta.topic.id)) + '">Select documents for chat</button><button class="pkb-action danger" type="button" data-pkb-delete-topic="' + escapeHtml(String(meta.topic.id)) + '">Delete topic</button></div>') +
          "<p>Topic building with " + escapeHtml(String((meta.topic.documents_list || []).length)) + " document(s).</p>" +
          "<p>Created: " + escapeHtml(formatDate(meta.topic.created_at)) + "</p>" +
          (firstLink && safeHref(firstLink.source_url) ? '<p><a href="' + safeHref(firstLink.source_url) + '" target="_blank" rel="noopener noreferrer">Open a source from this topic</a></p>' : "");
        renderPKBDocuments(meta.topic.documents_list || []);
      } else {
        const doc = meta.document;
        const topicDocs = Array.isArray(meta.topic.documents_list) ? meta.topic.documents_list : [];
        const relatedDocs = topicDocs.filter((item) => Number(item.id) !== Number(doc.id));
        pkbDetailEl.innerHTML =
          '<div class="pkb-topic-summary">' +
          '<div class="pkb-topic-summary-head">' +
          '<div class="pkb-topic-summary-title"><h4>' + escapeHtml(doc.title || "(untitled document)") + "</h4></div>" +
          '<button class="pkb-action" type="button" data-pkb-close-document="' + escapeHtml(String(meta.topic.id)) + '">Close</button>' +
          "</div>" +
          '<div class="pkb-topic-summary-meta">' +
          '<p>Topic: <span class="pkb-topic-value">' + escapeHtml(doc.topic_title || meta.topic.title) + "</span></p>" +
          "<p>Kind: " + escapeHtml(doc.kind || "note") + "</p>" +
          (doc.ingest_method ? "<p>Ingest: " + escapeHtml(doc.ingest_method) + "</p>" : "") +
          (doc.source_url && safeHref(doc.source_url) ? '<p><a href="' + safeHref(doc.source_url) + '" target="_blank" rel="noopener noreferrer">Open source</a></p>' : "") +
          "</div>" +
          "</div>" +
          '<div class="pkb-content">' + renderPKBContent(doc.content || "", doc.ingest_method || "") + "</div>" +
          '<div class="pkb-topic-summary-actions"><button class="pkb-action danger" type="button" data-pkb-delete-document="' + escapeHtml(String(doc.id)) + '" data-pkb-topic-id="' + escapeHtml(String(meta.topic.id)) + '">Delete document</button></div>';
        renderPKBDocuments(relatedDocs);
      }
      bindPKBChatSelectionActions();
      bindPKBDeleteActions();
      bindPKBCloseActions();
      renderPKBStats(pkbSceneState.currentTopics || []);
    }

    function bindPKBChatSelectionActions() {
      pkbDetailEl.querySelectorAll("[data-pkb-select-chat]").forEach((button) => {
        button.addEventListener("click", () => {
          const topicID = Number(button.getAttribute("data-pkb-select-chat") || "0");
          const topic = (pkbSceneState.currentTopics || []).find((item) => Number(item.id) === Number(topicID));
          if (!topic) {
            return;
          }
          pkbChatSelection = {
            topicID,
            selectedDocIDs: new Set()
          };
          renderPKBSelection({ kind: "topic", topic, focus: topic.focus || null });
          setStatus("Select one or more documents, then start chat with them.");
        });
      });
      pkbDetailEl.querySelectorAll("[data-pkb-chat-selected]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!pkbChatSelection) {
            return;
          }
          const topic = (pkbSceneState.currentTopics || []).find((item) => Number(item.id) === Number(pkbChatSelection.topicID));
          if (!topic) {
            return;
          }
          const selected = (topic.documents_list || []).filter((doc) => pkbChatSelection.selectedDocIDs.has(Number(doc.id)));
          if (!selected.length) {
            setStatus("Select at least one document first.");
            return;
          }
          chatScopeState = {
            topicID: topic.id,
            topicTitle: topic.title || ("Topic " + topic.id),
            documents: selected.map((doc) => ({ ...doc }))
          };
          renderChatScope();
          newConversationOnNextSend = true;
          await resetAgentMemory("memory reset (document chat scope applied)");
          closePKBView();
          addOp("document chat scope applied");
          setStatus("Document chat scope ready. Your next message will use only the selected documents.");
        });
      });
      pkbDetailEl.querySelectorAll("[data-pkb-cancel-select-chat]").forEach((button) => {
        button.addEventListener("click", () => {
          const topicID = Number(button.getAttribute("data-pkb-cancel-select-chat") || "0");
          pkbChatSelection = null;
          const topic = (pkbSceneState.currentTopics || []).find((item) => Number(item.id) === Number(topicID));
          if (!topic) {
            renderPKBSelection(null);
            return;
          }
          renderPKBSelection({ kind: "topic", topic, focus: topic.focus || null });
        });
      });
    }

    function bindPKBCloseActions() {
      pkbDetailEl.querySelectorAll("[data-pkb-close-document]").forEach((node) => {
        node.addEventListener("click", (event) => {
          const topicID = Number(node.getAttribute("data-pkb-close-document") || "0");
          if (!topicID) {
            return;
          }
          const topic = (pkbSceneState.currentTopics || []).find((item) => Number(item.id) === Number(topicID));
          if (!topic) {
            return;
          }
          renderPKBSelection({ kind: "topic", topic, focus: topic.focus || null });
        });
      });
    }

    function bindPKBDeleteActions() {
      pkbDetailEl.querySelectorAll("[data-pkb-delete-topic]").forEach((button) => {
        button.addEventListener("click", async () => {
          const topicID = Number(button.getAttribute("data-pkb-delete-topic") || "0");
          if (!topicID) {
            return;
          }
          const selected = pkbSceneState.selected;
          const title = selected && selected.topic ? (selected.topic.title || ("Topic " + topicID)) : ("Topic " + topicID);
          if (!window.confirm('Delete topic "' + title + '" and all related documents?')) {
            return;
          }
          await deletePKBTopic(topicID);
        });
      });
      pkbDetailEl.querySelectorAll("[data-pkb-delete-document]").forEach((button) => {
        button.addEventListener("click", async () => {
          const documentID = Number(button.getAttribute("data-pkb-delete-document") || "0");
          if (!documentID) {
            return;
          }
          const selected = pkbSceneState.selected;
          const title = selected && selected.document ? (selected.document.title || ("Document " + documentID)) : ("Document " + documentID);
          if (!window.confirm('Delete document "' + title + '"?')) {
            return;
          }
          await deletePKBDocument(documentID);
        });
      });
    }

    function renderPKBDocuments(documents) {
      pkbDocumentsEl.innerHTML = "";
      if (!documents.length) {
        pkbDocumentsEl.innerHTML = '<div class="pkb-empty">No documents in this selection.</div>';
        return;
      }
      const selecting = !!pkbChatSelection;
      for (const doc of documents) {
        const card = document.createElement("div");
        const selected = selecting && pkbChatSelection.selectedDocIDs.has(Number(doc.id));
        card.className = "pkb-card " + (selecting ? "is-selecting" : "is-clickable") + (selected ? " is-selected" : "");
        card.innerHTML =
          "<h4>" + escapeHtml(doc.title || "(untitled document)") + "</h4>" +
          "<p>" + escapeHtml(doc.kind || "note") + "</p>" +
          (doc.ingest_method ? "<p>" + escapeHtml(doc.ingest_method) + "</p>" : "") +
          (doc.source_url && safeHref(doc.source_url) ? '<p><a href="' + safeHref(doc.source_url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(doc.source_url) + "</a></p>" : "") +
          "<div>" + escapeHtml(trimText(doc.content || "", 260)) + "</div>";
        card.addEventListener("click", (event) => {
          if (event.target && event.target.closest("a")) {
            return;
          }
          if (selecting) {
            const docID = Number(doc.id);
            if (pkbChatSelection.selectedDocIDs.has(docID)) {
              pkbChatSelection.selectedDocIDs.delete(docID);
            } else {
              pkbChatSelection.selectedDocIDs.add(docID);
            }
            const topic = (pkbSceneState.currentTopics || []).find((item) => Number(item.id) === Number(doc.topic_id)) || {
              id: doc.topic_id,
              title: doc.topic_title || "",
              documents_list: documents
            };
            renderPKBSelection({ kind: "topic", topic, focus: topic.focus || null });
            return;
          }
          const topic = (pkbSceneState.currentTopics || []).find((item) => Number(item.id) === Number(doc.topic_id)) || {
            title: doc.topic_title || "",
            documents_list: documents
          };
          renderPKBSelection({ kind: "document", topic, document: doc });
        });
        pkbDocumentsEl.appendChild(card);
      }
    }

    function trimText(text, max) {
      const value = String(text || "").trim();
      if (value.length <= max) {
        return value;
      }
      return value.slice(0, max - 1).trimEnd() + "…";
    }

    function formatDate(value) {
      if (!value) {
        return "n/a";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }
      return date.toLocaleString();
    }

    function renderPKBContent(text, ingestMethod) {
      const raw = String(text || "").trim();
      if (!raw) {
        return "";
      }
      const method = String(ingestMethod || "").toLowerCase();
      if (method.includes("markdown")) {
        return markdownToHtml(raw)
          .replace(/<br>\s*(?=<\/?(h\d|p|ul|ol|li|pre|blockquote))/g, "")
          .replace(/(<\/h\d>|<\/p>|<\/ul>|<\/ol>|<\/pre>|<\/blockquote>)<br>/g, "$1")
          .replace(/(<h\d[^>]*>.*?<\/h\d>)<br>/g, "$1")
          .replace(/(<br>\s*){3,}/g, "<br><br>");
      }
      return escapeHtml(raw)
        .replace(/\n{3,}/g, "\n\n")
        .replace(/\n/g, "<br>");
    }

    function colorHex(name, fallback) {
      const raw = getComputedStyle(document.body).getPropertyValue(name).trim() || fallback;
      return parseInt(raw.replace("#", ""), 16);
    }

    function ensurePKBScene() {
      if (pkbSceneState.renderer || !window.THREE) {
        return;
      }
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      pkbCanvasEl.innerHTML = "";
      pkbCanvasEl.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();

      const ambient = new THREE.AmbientLight(0xffffff, 1.15);
      scene.add(ambient);
      const key = new THREE.DirectionalLight(0xffffff, 1.8);
      key.position.set(12, 20, 10);
      scene.add(key);
      const fill = new THREE.PointLight(colorHex("--accent", "#3DF2E0"), 14, 120);
      fill.position.set(0, 18, 0);
      scene.add(fill);

      const ground = new THREE.Mesh(
        new THREE.CylinderGeometry(18, 22, 0.8, 48),
        new THREE.MeshStandardMaterial({
          color: colorHex("--pkb-ground", "#0f1a24"),
          metalness: 0.4,
          roughness: 0.7
        })
      );
      ground.position.y = -0.6;
      scene.add(ground);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(14, 0.08, 12, 80),
        new THREE.MeshStandardMaterial({ color: colorHex("--pkb-ring", "#225265") })
      );
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      pkbSceneState.renderer = renderer;
      pkbSceneState.scene = scene;
      pkbSceneState.camera = camera;
      pkbSceneState.raycaster = raycaster;
      pkbSceneState.pointer = pointer;

      renderer.domElement.addEventListener("pointerdown", onPKBPointerDown);
      renderer.domElement.addEventListener("pointermove", onPKBPointerMove);
      renderer.domElement.addEventListener("pointerup", onPKBPointerUp);
      renderer.domElement.addEventListener("pointerleave", onPKBPointerUp);
      renderer.domElement.addEventListener("wheel", onPKBWheel, { passive: false });
      renderer.domElement.addEventListener("click", onPKBClick);
      if (typeof ResizeObserver !== "undefined") {
        pkbSceneState.resizeObserver = new ResizeObserver(() => {
          if (currentMainTab() === "pkb") {
            resizePKBRenderer();
          }
        });
        pkbSceneState.resizeObserver.observe(pkbCanvasEl);
      }

      resizePKBRenderer();
      tickPKBScene();
    }

    function resizePKBRenderer() {
      if (!pkbSceneState.renderer || !pkbCanvasEl.clientWidth || !pkbCanvasEl.clientHeight) {
        return;
      }
      pkbSceneState.renderer.setSize(pkbCanvasEl.clientWidth, pkbCanvasEl.clientHeight);
      pkbSceneState.camera.aspect = pkbCanvasEl.clientWidth / pkbCanvasEl.clientHeight;
      pkbSceneState.camera.updateProjectionMatrix();
      updatePKBCamera();
    }

    function startPKBResizeLoop() {
      stopPKBResizeLoop();
      const tick = () => {
        if (currentMainTab() !== "pkb") {
          stopPKBResizeLoop();
          return;
        }
        resizePKBRenderer();
        pkbSceneState.resizeAnimationFrame = requestAnimationFrame(tick);
      };
      pkbSceneState.resizeAnimationFrame = requestAnimationFrame(tick);
    }

    function stopPKBResizeLoop() {
      if (pkbSceneState.resizeAnimationFrame) {
        cancelAnimationFrame(pkbSceneState.resizeAnimationFrame);
        pkbSceneState.resizeAnimationFrame = 0;
      }
    }

    function updatePKBCamera() {
      if (!pkbSceneState.camera) {
        return;
      }
      const target = pkbSceneState.target;
      target.currentX += (target.goalX - target.currentX) * 0.12;
      target.currentY += (target.goalY - target.currentY) * 0.12;
      target.currentZ += (target.goalZ - target.currentZ) * 0.12;
      const { yaw, pitch, radius } = pkbSceneState.orbit;
      const x = target.currentX + Math.cos(yaw) * Math.cos(pitch) * radius;
      const y = target.currentY + Math.sin(pitch) * radius * 0.9 + 5;
      const z = target.currentZ + Math.sin(yaw) * Math.cos(pitch) * radius;
      pkbSceneState.camera.position.set(x, y, z);
      pkbSceneState.camera.lookAt(target.currentX, target.currentY, target.currentZ);
    }

    function setPKBTarget(x, y, z) {
      pkbSceneState.target.goalX = Number(x) || 0;
      pkbSceneState.target.goalY = Number(y) || 2;
      pkbSceneState.target.goalZ = Number(z) || 0;
    }

    function clearPKBMeshes() {
      if (!pkbSceneState.scene) {
        return;
      }
      for (const mesh of pkbSceneState.meshes) {
        pkbSceneState.scene.remove(mesh);
        if (mesh.geometry) {
          mesh.geometry.dispose();
        }
        if (mesh.material && mesh.material.map && typeof mesh.material.map.dispose === "function") {
          mesh.material.map.dispose();
        }
        if (mesh.material && typeof mesh.material.dispose === "function") {
          mesh.material.dispose();
        }
      }
      pkbSceneState.meshes = [];
    }

    function createTopicLabelSprite(text, scaleFactor) {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const raw = String(text || "").trim() || "Untitled";
      const label = raw.length > 20 ? raw.slice(0, 19).trimEnd() + "…" : raw;
      const fontSize = 18;
      ctx.font = "600 " + fontSize + "px 'Kode Mono', monospace";
      const textWidth = Math.ceil(ctx.measureText(label).width);
      canvas.width = Math.max(72, textWidth + 18);
      canvas.height = 32;

      ctx.font = "600 " + fontSize + "px 'Kode Mono', monospace";
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const styles = getComputedStyle(document.body);
      ctx.fillStyle = styles.getPropertyValue("--pkb-label-bg").trim() || "rgba(11, 15, 20, 0.78)";
      ctx.strokeStyle = styles.getPropertyValue("--pkb-label-border").trim() || "rgba(61, 242, 224, 0.55)";
      ctx.lineWidth = 1.5;
      const radius = 8;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(canvas.width - radius, 0);
      ctx.quadraticCurveTo(canvas.width, 0, canvas.width, radius);
      ctx.lineTo(canvas.width, canvas.height - radius);
      ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - radius, canvas.height);
      ctx.lineTo(radius, canvas.height);
      ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = styles.getPropertyValue("--pkb-label-text").trim() || "#E8FFFC";
      ctx.fillText(label, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        depthTest: false
      });
      const sprite = new THREE.Sprite(material);
      const aspect = canvas.width / canvas.height;
      const size = 1.35 * (scaleFactor || 1);
      sprite.scale.set(size * aspect, size, 1);
      sprite.renderOrder = 10;
      return sprite;
    }

    function buildPKBScene(topics) {
      ensurePKBScene();
      clearPKBMeshes();
      pkbSceneState.currentTopics = topics;
      renderPKBStats(topics);
      renderPKBSelection(null);

      const topicCount = topics.length;
      pkbSummaryEl.textContent = topicCount + " topic(s) in personal knowledge base";
      if (!topicCount) {
        return;
      }

      const cols = Math.max(1, Math.ceil(Math.sqrt(topicCount)));
      const spacing = 7.2;
      const startX = -((cols - 1) * spacing) / 2;
      const topicColor = colorHex("--pkb-topic", "#2bc4b5");
      const docColor = colorHex("--pkb-doc", "#6ecbc3");
      const topicEmissiveColor = colorHex("--pkb-topic-emissive", "#14313d");
      const docEmissiveColor = colorHex("--pkb-doc-emissive", "#1a3f4b");
      const labelScale = Math.max(0.42, Math.min(0.72, 6 / Math.max(topicCount, 6)));

      topics.forEach((topic, index) => {
        const row = Math.floor(index / cols);
        const col = index % cols;
        const x = startX + col * spacing;
        const z = (row - Math.floor((topicCount - 1) / cols / 2)) * spacing;
        const docs = Array.isArray(topic.documents_list) ? topic.documents_list : [];
        const height = 2 + Math.max(0, docs.length) * 0.65;
        const building = new THREE.Mesh(
          new THREE.BoxGeometry(2.4, height, 2.4),
          new THREE.MeshStandardMaterial({
            color: topicColor,
            emissive: topicEmissiveColor,
            emissiveIntensity: 0.12,
            metalness: 0.35,
            roughness: 0.4
          })
        );
        building.position.set(x, height / 2, z);
        building.userData = { kind: "topic", topic, focus: { x, y: Math.max(2, height / 2), z } };
        pkbSceneState.scene.add(building);
        pkbSceneState.meshes.push(building);

        const label = createTopicLabelSprite(topic.title, labelScale);
        label.position.set(x, height + 0.7 + labelScale, z);
        pkbSceneState.scene.add(label);
        pkbSceneState.meshes.push(label);

        docs.forEach((doc, docIndex) => {
          const angle = (Math.PI * 2 * docIndex) / Math.max(docs.length, 1);
          const radius = 2.8 + (docIndex % 3) * 0.5;
          const docHeight = 0.7 + Math.min(1.8, (doc.content || "").length / 900);
          const node = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, docHeight, 0.8),
            new THREE.MeshStandardMaterial({
              color: docColor,
              emissive: docEmissiveColor,
              emissiveIntensity: 0.08,
              metalness: 0.15,
              roughness: 0.55
            })
          );
          node.position.set(
            x + Math.cos(angle) * radius,
            docHeight / 2,
            z + Math.sin(angle) * radius
          );
          node.userData = {
